<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look The Cats - Segala Kebutuhan Anabul</title>
    
    <!-- Memanggil Tailwind CSS untuk Styling Responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memanggil Icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Animasi Kustom -->
    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        /* Mencegah scroll saat modal terbuka */
        body.modal-open { overflow: hidden; }

        /* Support untuk iPhone notch/safe area (Garis bawah iPhone) */
        .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col text-">

    <!-- --- NAVBAR --- -->
    <nav class="bg-orange-500 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateTo('home')">
                    <div class="bg-white text-orange-500 p-1.5 rounded-full flex items-center justify-center">
                        <i data-lucide="heart" fill="currentColor" class="w-5 h-5"></i>
                    </div>
                    <span class="font-bold text-xl tracking-wide">Look The Cats</span>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-8 items-center" id="desktop-menu">
                </div>

                <!-- Cart & Mobile Toggle -->
                <div class="flex items-center space-x-4">
                    <button onclick="toggleCart()" class="relative p-2 hover:bg-orange-600 rounded-full transition">
                        <i data-lucide="shopping-cart"></i>
                        <span id="cart-badge" class="hidden absolute top-0 right-0 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-orange-500">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- --- MOBILE BOTTOM NAVIGATION --- -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.1)] z-[45] px-6 pt-2 pb-safe flex justify-between items-center" id="mobile-bottom-nav">
    </nav>

    <!-- --- MAIN CONTENT --- -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 py-6 md:py-8 flex-grow w-full pb-24 md:pb-8">
    </main>

    <!-- --- FOOTER --- -->
    <footer class="bg-gray-800 text-gray-300 py-6 text-center mt-auto mb-16 md:mb-0">
        <p class="font-semibold text-white mb-2">Look The Cats &copy; 2026</p>
        <p class="text-sm">Platform terbaik untuk pecinta kucing di Indonesia.</p>
        <p class="text-xs mt-2">WhatsApp Admin: 081296629033</p>
    </footer>

    <!-- --- CART MODAL --- -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex justify-end">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col animate-slide-in-right">
            <div class="p-4 bg-orange-500 text-white flex justify-between items-center shadow-sm z-10">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="shopping-cart"></i> Keranjang Belanja
                </h2>
                <button onclick="toggleCart()" class="hover:bg-orange-600 p-1.5 rounded-full transition">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 bg-gray-50"></div>

            <div id="cart-footer" class="hidden p-4 border-t bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>Total:</span>
                    <span class="text-orange-600" id="cart-total-price">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i> Lanjut Pembayaran
                </button>
            </div>
        </div>
    </div>

    <!-- --- MESSAGE BOX --- -->
    <div id="message-box" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl z-[70] flex items-center gap-3 animate-fade-in">
        <i data-lucide="info" class="text-orange-400"></i>
        <span id="message-box-text" class="font-medium"></span>
    </div>

    <script>
        // --- DATA MOCKUP ---
        const PRODUCTS = [
            { id: 1, name: 'Makanan Kucing Premium (Salmon) 1kg', price: 75000, category: 'Makanan', image: 'bg-orange-200' },
            { id: 2, name: 'Pasir Kucing Wangi Lemon 5L', price: 45000, category: 'Perawatan', image: 'bg-yellow-200' },
            { id: 3, name: 'Mainan Tongkat Bulu Interaktif', price: 25000, category: 'Mainan', image: 'bg-pink-200' },
            { id: 4, name: 'Tempat Tidur Kucing Empuk', price: 120000, category: 'Aksesoris', image: 'bg-blue-200' },
            { id: 5, name: 'Snack Kucing Creamy (Tuna) 4pcs', price: 15000, category: 'Makanan', image: 'bg-red-200' },
            { id: 6, name: 'Shampo Kucing Anti Kutu 250ml', price: 35000, category: 'Perawatan', image: 'bg-green-200' },
        ];

        const ACTIVITIES = [
            { id: 1, title: 'Adopsi Kucing Bersama', date: '25 April 2026', location: 'Taman Kota Tangerang', type: 'Adopsi', iconColor: 'text-orange-600', bgColor: 'bg-orange-100' },
            { id: 2, title: 'Vaksinasi Rabies Gratis', date: '02 Mei 2026', location: 'Klinik Look The Cats', type: 'Kesehatan', iconColor: 'text-blue-600', bgColor: 'bg-blue-100' },
            { id: 3, title: 'Kontes Kucing Sehat', date: '15 Mei 2026', location: 'Mall Alam Sutera', type: 'Kompetisi', iconColor: 'text-pink-600', bgColor: 'bg-pink-100' },
            { id: 4, title: 'Seminar Perawatan Anak Kucing', date: '20 Mei 2026', location: 'Online Zoom', type: 'Edukasi', iconColor: 'text-green-600', bgColor: 'bg-green-100' },
        ];

        // --- STATE APP ---
        let currentPage = 'home';
        let cart = [];
        let userCatImage = null;
        let currentUser = null; 
        let isLoginView = false;
        let mockUsers = [
            { name: 'Andi Susanto', email: 'andi@email.com', wa: '081234567891', catName: 'Garfield', role: 'member', joinDate: 'Januari', wilayah: 'Jakarta', status: 'Aktif' },
            { name: 'Rina Melati', email: 'rina@email.com', wa: '089876543210', catName: 'Mochi', role: 'member', joinDate: 'Februari', wilayah: 'Bandung', status: 'Aktif' }
        ];

        // --- CORE FUNCTIONS ---
        function triggerUpload() { 
            const isAdmin = currentUser?.role?.includes('admin');
            if (isAdmin) {
                document.getElementById('cat-image-upload')?.click(); 
            } else {
                showMessage("Hanya Admin yang bisa mengganti foto maskot!");
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userCatImage = e.target.result;
                    if (currentPage === 'home') renderPage();
                    showMessage('Foto maskot berhasil diperbarui oleh Admin! 😻');
                }
                reader.readAsDataURL(file);
            }
        }

        const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        const showMessage = (text) => {
            const msgBox = document.getElementById('message-box');
            document.getElementById('message-box-text').innerText = text;
            msgBox.classList.remove('hidden');
            setTimeout(() => { msgBox.classList.add('hidden'); }, 3000);
        };

        // --- ADMIN ACTIONS ---
        function toggleMemberStatus(index) {
            const user = mockUsers[index];
            user.status = user.status === 'Aktif' ? 'Nonaktif' : 'Aktif';
            showMessage(`Akun ${user.name} sekarang ${user.status}`);
            renderPage();
        }

        function addProductManual() {
            const name = prompt("Nama Produk:");
            const price = parseInt(prompt("Harga (Angka):"));
            if (name && price) {
                PRODUCTS.push({ id: PRODUCTS.length + 1, name, price, category: 'Lainnya', image: 'bg-gray-200' });
                showMessage("Produk baru berhasil ditambahkan!");
                if (currentPage === 'shop') renderPage();
            }
        }

        // --- AUTH LOGIC ---
        function toggleAuthView() { isLoginView = !isLoginView; renderPage(); }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const wa = document.getElementById('reg-wa').value;
            const catName = document.getElementById('reg-cat').value;
            const wilayah = document.getElementById('reg-wilayah').value;
            
            currentUser = { name, email, wa, catName, role: 'member', joinDate: 'Hari ini', wilayah, status: 'Aktif' };
            mockUsers.push(currentUser);
            showMessage(`Meow! Selamat bergabung, ${name}!`);
            navigateTo('home');
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value.toLowerCase();
            
            if (email.includes('pusat')) {
                currentUser = { name: 'Admin Pusat', email, role: 'admin_pusat', status: 'Aktif', wilayah: 'Pusat' };
            } else if (email.includes('admin')) {
                currentUser = { name: 'Admin Wilayah', email, role: 'admin_wilayah', status: 'Aktif', wilayah: 'Tangerang' };
            } else {
                currentUser = mockUsers.find(u => u.email === email) || { name: 'Cat Lover', email, role: 'member', status: 'Aktif', wilayah: 'Umum' };
            }
            showMessage(`Halo ${currentUser.name}, kamu berhasil masuk!`);
            navigateTo('home');
        }

        function handleLogout() { currentUser = null; showMessage('Berhasil keluar.'); navigateTo('home'); }

        // --- NAVIGATION ---
        function navigateTo(page) {
            currentPage = page;
            renderNavbar();
            renderPage();
            window.scrollTo(0, 0);
        }

        function renderNavbar() {
            const menuItems = [
                { id: 'home', label: 'Beranda', icon: 'home' },
                { id: 'shop', label: 'Toko', icon: 'shopping-bag' },
                { id: 'activities', label: 'Kegiatan', icon: 'calendar' },
                { id: 'account', label: 'Akun', icon: 'user' },
                { id: 'admin', label: 'Admin', icon: 'shield' }
            ];

            const desk = document.getElementById('desktop-menu');
            const mob = document.getElementById('mobile-bottom-nav');

            desk.innerHTML = menuItems.map(m => `
                <button onclick="navigateTo('${m.id}')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === m.id ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="${m.icon}" class="w-4 h-4"></i> <span>${m.label}</span>
                </button>
            `).join('');

            mob.innerHTML = menuItems.map(m => `
                <button onclick="navigateTo('${m.id}')" class="flex flex-col items-center w-full py-1 ${currentPage === m.id ? 'text-orange-600' : 'text-gray-400'} transition">
                    <i data-lucide="${m.icon}" class="w-5 h-5 mb-1"></i>
                    <span class="text-[10px] font-bold">${m.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        // --- CART LOGIC ---
        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.classList.toggle('hidden');
            document.body.classList.toggle('modal-open');
            renderCart();
        }

        function addToCart(productId) {
            const p = PRODUCTS.find(x => x.id === productId);
            const item = cart.find(x => x.id === productId);
            if (item) item.quantity++; else cart.push({ ...p, quantity: 1 });
            updateCartBadge();
            showMessage('Masuk keranjang! 🛒');
        }

        function updateCartBadge() {
            const c = cart.reduce((t, i) => t + i.quantity, 0);
            const b = document.getElementById('cart-badge');
            b.innerText = c; b.classList.toggle('hidden', c === 0);
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const footer = document.getElementById('cart-footer');
            if (cart.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 mt-20"><i data-lucide="shopping-bag" class="w-16 h-16 opacity-30 mb-2"></i><p>Keranjang Kosong</p></div>`;
                footer.classList.add('hidden');
            } else {
                let total = 0;
                container.innerHTML = cart.map(i => {
                    total += i.price * i.quantity;
                    return `<div class="flex gap-4 bg-white p-3 rounded-xl border mb-2 shadow-sm">
                        <div class="w-16 h-16 rounded-lg ${i.image} flex-shrink-0"></div>
                        <div class="flex-1">
                            <p class="font-bold text-sm leading-tight">${i.name}</p>
                            <p class="text-orange-500 text-xs font-bold mt-1">${formatRupiah(i.price)} x ${i.quantity}</p>
                            <button onclick="cart = cart.filter(x => x.id !== ${i.id}); renderCart(); updateCartBadge();" class="text-red-400 text-xs mt-1 underline font-bold">Hapus</button>
                        </div>
                    </div>`;
                }).join('');
                document.getElementById('cart-total-price').innerText = formatRupiah(total);
                footer.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        function checkout() {
            window.open(`https://wa.me/6281296629033?text=Halo%20Admin,%20saya%20ingin%20memesan%20kebutuhan%20kucing.`, '_blank');
            toggleCart();
        }

        // --- PAGES RENDERER ---
        function renderPage() {
            const main = document.getElementById('main-content');
            const isAdmin = currentUser?.role?.includes('admin');
            
            if (currentPage === 'home') {
                main.innerHTML = `
                    <div class="space-y-8 animate-fade-in">
                        <section class="bg-gradient-to-r from-orange-100 to-orange-50 rounded-[2rem] p-6 sm:p-12 flex flex-col-reverse md:flex-row items-center gap-8 shadow-sm">
                            <div class="flex-1 space-y-6 text-center md:text-left">
                                <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 leading-tight">Look The Cats <span class="text-orange-500 block">Ada untuk Anabul</span></h1>
                                <p class="text-gray-600">Platform pendaftaran anggota, belanja pakan, hingga info kegiatan kucing nasional.</p>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button onclick="navigateTo('shop')" class="bg-orange-500 text-white px-8 py-3 rounded-full font-bold shadow-lg">Belanja Sekarang</button>
                                    <button onclick="navigateTo('activities')" class="bg-white text-orange-500 border-2 border-orange-200 px-8 py-3 rounded-full font-bold">Lihat Event</button>
                                </div>
                            </div>
                            <div class="flex-1 flex justify-center">
                                <div onclick="triggerUpload()" class="w-52 h-52 md:w-80 md:h-80 bg-orange-200 rounded-full flex items-center justify-center relative overflow-hidden ring-4 ring-white shadow-xl ${isAdmin ? 'cursor-pointer group' : ''}">
                                    ${isAdmin ? '<input type="file" id="cat-image-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">' : ''}
                                    ${userCatImage ? `<img src="${userCatImage}" class="w-full h-full object-cover">` : '<i data-lucide="cat" class="w-24 h-24 text-orange-400"></i>'}
                                    ${isAdmin ? `<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center text-white text-xs font-bold transition">GANTI FOTO MASKOT</div>` : ''}
                                </div>
                            </div>
                        </section>
                    </div>
                `;
            } 
            else if (currentPage === 'shop') {
                main.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-bold text-gray-800">Toko Kebutuhan</h2>
                        ${isAdmin ? `<button onclick="addProductManual()" class="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4"></i> Tambah Produk</button>` : ''}
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">` + 
                    PRODUCTS.map(p => `
                        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden hover:shadow-lg transition">
                            <div class="h-48 ${p.image} flex items-center justify-center font-bold text-gray-400">Produk</div>
                            <div class="p-5">
                                <h3 class="font-bold text-lg h-12 line-clamp-2">${p.name}</h3>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-orange-600 font-bold">${formatRupiah(p.price)}</span>
                                    <button onclick="addToCart(${p.id})" class="bg-gray-900 text-white p-2 rounded-lg transition hover:bg-orange-500"><i data-lucide="shopping-cart" class="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    `).join('') + `</div>`;
            }
            else if (currentPage === 'activities') {
                main.innerHTML = `
                    <div class="space-y-8 animate-fade-in">
                        <h2 class="text-3xl font-bold">Agenda & Kegiatan</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            ${ACTIVITIES.map(a => `
                                <div class="bg-white p-6 rounded-2xl shadow-sm border flex gap-5">
                                    <div class="${a.bgColor} ${a.iconColor} w-20 h-20 rounded-2xl flex flex-col items-center justify-center font-bold">
                                        <span class="text-xs uppercase">${a.date.split(' ')[1]}</span>
                                        <span class="text-2xl">${a.date.split(' ')[0]}</span>
                                    </div>
                                    <div class="flex-1">
                                        <h3 class="font-bold text-lg leading-tight text-gray-800">${a.title}</h3>
                                        <p class="text-gray-400 text-sm mt-1"><i data-lucide="map-pin" class="inline w-3 h-3"></i> ${a.location}</p>
                                        <button onclick="window.open('https://wa.me/6281296629033', '_blank')" class="text-orange-500 font-bold text-sm mt-3 uppercase tracking-wider">Daftar &rarr;</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-10 bg-blue-50 border border-blue-100 rounded-3xl p-8 flex flex-col md:flex-row items-center gap-6 shadow-sm">
                            <div class="bg-blue-500 text-white p-4 rounded-2xl shadow-lg"><i data-lucide="info" class="w-8 h-8"></i></div>
                            <div class="text-center md:text-left flex-1">
                                <h4 class="font-bold text-xl text-blue-900">Punya Info Kegiatan?</h4>
                                <p class="text-blue-700 mt-1">Bantu kami memperbarui jadwal. Hubungi admin untuk menambahkan acara di wilayahmu.</p>
                                <button onclick="window.open('https://wa.me/6281296629033', '_blank')" class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-full font-bold shadow-sm border border-blue-100 hover:bg-blue-50 transition">Hubungi Admin (WA)</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            else if (currentPage === 'account') {
                if (currentUser) {
                    main.innerHTML = `
                        <div class="max-w-md mx-auto bg-white p-10 rounded-[3rem] shadow-lg border text-center animate-fade-in">
                            <div class="w-24 h-24 bg-orange-100 rounded-full mx-auto flex items-center justify-center text-orange-600 font-bold text-3xl mb-4 border-4 border-white shadow-sm">${currentUser.name.charAt(0)}</div>
                            <h2 class="text-2xl font-bold">${currentUser.name}</h2>
                            <p class="text-gray-400 mb-6">${currentUser.email}</p>
                            <div class="bg-gray-50 p-6 rounded-2xl text-left space-y-3 text-sm">
                                <p><b>WhatsApp:</b> ${currentUser.wa || '-'}</p>
                                <p><b>Wilayah:</b> ${currentUser.wilayah || 'Umum'}</p>
                                <p><b>Status:</b> <span class="font-bold ${currentUser.status === 'Aktif' ? 'text-green-600' : 'text-red-600'}">${currentUser.status}</span></p>
                            </div>
                            <button onclick="handleLogout()" class="w-full mt-8 bg-red-50 text-red-600 py-3 rounded-2xl font-bold transition hover:bg-red-100">Keluar (Logout)</button>
                        </div>
                    `;
                } else {
                    main.innerHTML = `
                        <div class="max-w-md mx-auto bg-white p-10 rounded-[2.5rem] shadow-xl border animate-fade-in">
                            <h2 class="text-3xl font-bold text-center mb-8">${isLoginView ? 'Masuk' : 'Daftar Member'}</h2>
                            <form onsubmit="${isLoginView ? 'handleLogin(event)' : 'handleRegister(event)'}" class="space-y-4">
                                ${!isLoginView ? `
                                    <input type="text" id="reg-name" required placeholder="Nama Lengkap" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                    <input type="tel" id="reg-wa" required placeholder="No WA (08...)" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                    <select id="reg-wilayah" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                        <option value="Jakarta">Jakarta</option><option value="Tangerang">Tangerang</option><option value="Bandung">Bandung</option>
                                    </select>
                                    <input type="text" id="reg-cat" placeholder="Nama Kucing (Kitty)" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                ` : ''}
                                <input type="email" id="${isLoginView ? 'login-email' : 'reg-email'}" required placeholder="Email (admin@... atau pusat@...)" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                <input type="password" required placeholder="Password" class="w-full p-4 rounded-xl bg-gray-50 border outline-none">
                                <button class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg">${isLoginView ? 'Masuk' : 'Daftar & Aktifkan'}</button>
                            </form>
                            <p class="text-center mt-6 text-sm">
                                ${isLoginView ? 'Belum punya akun?' : 'Sudah punya akun?'} 
                                <button onclick="toggleAuthView()" class="text-orange-500 font-bold ml-1">Klik di sini</button>
                            </p>
                        </div>
                    `;
                }
            }
            else if (currentPage === 'admin') {
                if (!currentUser || !currentUser.role?.includes('admin')) {
                    main.innerHTML = `
                        <div class="max-w-md mx-auto text-center p-12 bg-white rounded-[2.5rem] border shadow-xl animate-fade-in mt-10">
                            <div class="bg-red-50 text-red-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6"><i data-lucide="shield-off" class="w-10 h-10"></i></div>
                            <h2 class="text-2xl font-bold">Akses Admin</h2>
                            <p class="text-gray-400 mt-2">Halaman ini hanya untuk Admin. Login dulu sebagai Admin (Email mengandung kata "admin" atau "pusat") ya!</p>
                            <button onclick="navigateTo('account')" class="mt-8 bg-orange-500 text-white px-8 py-3 rounded-full font-bold shadow-lg">Ke Halaman Login</button>
                        </div>
                    `;
                } else {
                    const isPusat = currentUser.role === 'admin_pusat';
                    main.innerHTML = `
                        <div class="space-y-8 animate-fade-in">
