<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Look The Cats - Sahabat Anabul Terbaik</title>
    
    <!-- Meta Tags PWA Experience -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LookTheCats">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fb923c">
    
    <!-- Ikon Jejak Kaki Kucing (SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fb923c'%3E%3Cpath d='M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z'/%3E%3C/svg%3E">

    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #fb923c;
            --secondary: #f472b6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fffaf5;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .cute-gradient {
            background: linear-gradient(135deg, #fb923c 0%, #f472b6 100%);
        }

        /* --- HEADER FIX --- */
        .glass-header {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(251, 146, 60, 0.1);
            position: sticky;
            top: 0;
            z-index: 2000; /* Z-Index sangat tinggi */
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cat-avatar-frame {
            position: relative;
            padding: 10px;
            background: white;
            border-radius: 9999px;
            box-shadow: 0 15px 35px -5px rgba(251, 146, 60, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .item-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .item-slider img {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- NAVIGASI MOBILE (7 MENU ANTI-TUMPUK) --- */
        .mobile-nav-wrapper {
            position: fixed;
            bottom: 1.5rem;
            left: 0.75rem;
            right: 0.75rem;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(251, 146, 60, 0.2);
            overflow: hidden;
            border: 1px solid rgba(251, 146, 60, 0.2);
        }

        .mobile-nav-scroll {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0.75rem 0.5rem;
            gap: 0.15rem;
            scroll-snap-type: x mandatory;
        }
        
        .mobile-nav-item {
            flex: 0 0 4.4rem; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-item-active {
            color: #fb923c;
        }

        .nav-item-active .icon-box {
            background: linear-gradient(135deg, #fb923c 0%, #f472b6 100%);
            box-shadow: 0 8px 15px rgba(251, 146, 60, 0.3);
            color: white;
            transform: scale(1.1) translateY(-2px);
        }

        .icon-box {
            padding: 0.65rem;
            border-radius: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(251, 146, 60, 0.05);
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- --- HEADER (FIXED LOGO POSITION) --- -->
    <header class="glass-header px-4 py-3">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer relative z-[2100]" onclick="navigateTo('home')">
                <div class="cute-gradient p-2 rounded-2xl shadow-lg shadow-orange-200">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z"/></svg>
                </div>
                <span class="font-extrabold text-xl tracking-tighter bg-clip-text text-transparent cute-gradient uppercase">Look The Cats</span>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2.5 bg-orange-50 text-orange-600 rounded-2xl transition-all active:scale-90 shadow-sm border border-orange-100 z-[2100]">
                <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
            </button>
        </div>
    </header>

    <!-- --- NAVIGASI MOBILE (7 MENU LENGKAP) --- -->
    <div class="md:hidden mobile-nav-wrapper">
        <div class="mobile-nav-scroll no-scrollbar" id="mobile-bottom-nav">
            <!-- Menu Rendered via JS -->
        </div>
    </div>

    <!-- --- DESKTOP NAV --- -->
    <nav class="hidden md:flex fixed top-24 right-10 flex-col gap-3 z-40 text-" id="desktop-menu"></nav>

    <!-- --- MAIN CONTENT --- -->
    <main id="main-content" class="flex-grow px-4 pt-4 pb-40 max-w-6xl mx-auto w-full">
        <!-- Area Render via Script -->
    </main>

    <!-- --- MODAL KERANJANG --- -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[3000] flex justify-end items-end md:items-stretch text-">
        <div class="bg-white w-full max-w-md h-[80vh] md:h-full shadow-2xl flex flex-col animate-pop rounded-t-[3rem] md:rounded-t-none md:rounded-l-[3rem] overflow-hidden border border-orange-50">
            <div class="p-6 cute-gradient text-white flex justify-between items-center">
                <h2 class="text-xl font-black flex items-center gap-3 uppercase"><i data-lucide="shopping-cart"></i> Keranjang</h2>
                <button onclick="toggleCart()" class="bg-white/20 p-2 rounded-2xl transition hover:bg-white/30 text-"><i data-lucide="x"></i></button>
            </div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div id="cart-footer" class="hidden p-8 border-t bg-gray-50 rounded-t-[2.5rem] text-">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span class="text-gray-400 text-sm uppercase self-center tracking-widest font-extrabold text-">Total Bayar</span>
                    <span class="text-orange-600" id="cart-total-price">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full cute-gradient text-white py-4 rounded-[2rem] font-black shadow-xl shadow-orange-200 active:scale-95 transition-all text-lg uppercase tracking-wider text-">Hubungi WhatsApp</button>
            </div>
        </div>
    </div>

    <!-- --- TOAST NOTIFIKASI --- -->
    <div id="message-box" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border border-orange-100 px-6 py-3 rounded-full shadow-2xl z-[4000] flex items-center gap-3 animate-pop text-">
        <div class="bg-orange-100 p-1.5 rounded-full text-orange-600 shadow-inner text-"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
        <span id="message-box-text" class="font-bold text-sm text-"></span>
    </div>

    <!-- --- FIREBASE LOGIC & SCRIPTS --- -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 1. Firebase Configuration Official
        const firebaseConfig = {
            apiKey: "AIzaSyBARlWoWFwiRI6VUuRMURYSbDaVzSRmn_U",
            authDomain: "look-the-cats-official.firebaseapp.com",
            projectId: "look-the-cats-official",
            storageBucket: "look-the-cats-official.firebasestorage.app",
            messagingSenderId: "1286590659",
            appId: "1:1286590659:web:1878a970fc778ae6f19276",
            measurementId: "G-XGF86YXY3Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const artifactAppId = 'look-the-cats-prod-official-v17-jumbo';

        // 2. Global State
        window.WHATSAPP_ADMIN = "6281296629033";
        window.ADMIN_PASS = "Yakin537@";
        window.PRODUCTS = [];
        window.CLINICS = [];
        window.ACTIVITIES_LIST = [];
        window.ADS_LIST = [];
        window.consultations = [];
        window.currentPage = 'home';
        window.cart = [];
        window.currentUser = null;
        window.userData = null; 
        window.isAdminUnlocked = false;
        window.tempUploadImages = [];
        window.productEditId = null;
        window.clinicEditId = null;
        window.isLoginView = true;
        window.isAddingAgenda = false; // State untuk toggle Agenda

        // 3. Sinkronisasi Data Cloud Realtime (Full)
        const setupCloudSync = () => {
            if (!window.currentUser) return;
            
            // Produk
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'products'), (s) => { 
                window.PRODUCTS = s.docs.map(d => ({id: d.id, ...d.data()})); 
                if(window.currentPage==='shop') renderContent(); 
            });

            // Klinik
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'clinics'), (s) => { 
                window.CLINICS = s.docs.map(d => ({id: d.id, ...d.data()})); 
                if(window.currentPage==='clinic') renderContent(); 
            });

            // Agenda
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'activities'), (s) => { 
                window.ACTIVITIES_LIST = s.docs.map(d => ({id: d.id, ...d.data()})); 
                if(window.currentPage==='activities') renderContent(); 
            });

            // Iklan
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'ads'), (s) => { 
                window.ADS_LIST = s.docs.map(d => ({id: d.id, ...d.data()})); 
                if(window.currentPage==='home') renderContent(); 
            });

            // Profil Member Realtime (FIX: Anti-Stuck)
            onSnapshot(doc(db, 'artifacts', artifactAppId, 'users', window.currentUser.uid, 'profile', 'info'), (s) => {
                window.userData = s.exists() ? s.data() : null;
                renderContent(); 
            });
        };

        // 4. Inisialisasi Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                setupCloudSync();
            } else {
                signInAnonymously(auth).catch(e => console.log("Database offline"));
            }
            renderNavs();
            renderContent();
        });

        // 5. Cloud Writes
        window.saveToFirestore = async (e, type) => {
            e.preventDefault();
            if (!window.currentUser) return showMsg("Login cloud diperlukan!");
            const name = document.getElementById('item-name').value;
            const collName = type === 'shop' ? 'products' : (type === 'clinic' ? 'clinics' : (type === 'ads' ? 'ads' : 'activities'));
            const collRef = collection(db, 'artifacts', artifactAppId, 'public', 'data', collName);
            let payload = { name, updatedAt: Date.now(), creatorId: window.currentUser.uid };

            if (type === 'shop') {
                payload = { ...payload, price: parseInt(document.getElementById('item-price').value), cat: document.getElementById('item-cat').value, images: window.tempUploadImages };
                if (window.productEditId) await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'products', window.productEditId), payload);
                else await addDoc(collRef, payload);
                window.navigateTo('shop');
            } else if (type === 'clinic') {
                payload = { ...payload, license: document.getElementById('c-license').value, doctor: document.getElementById('c-doctor').value, owner: document.getElementById('c-owner').value, address: document.getElementById('c-address').value, services: document.getElementById('c-services').value, images: window.tempUploadImages, color: 'bg-blue-100' };
                if (window.clinicEditId) await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'clinics', window.clinicEditId), payload);
                else await addDoc(collRef, payload);
                window.navigateTo('clinic');
            } else if (type === 'activities') {
                payload = { ...payload, date: document.getElementById('a-date').value, loc: document.getElementById('a-loc').value, type: document.getElementById('a-type').value, images: window.tempUploadImages, bg: 'bg-orange-50', color: 'text-orange-500' };
                await addDoc(collRef, payload);
                window.isAddingAgenda = false;
                window.navigateTo('activities');
            } else if (type === 'ads') {
                payload = { ...payload, image: window.tempUploadImages[0] || null };
                await addDoc(collRef, payload);
                window.navigateTo('home');
            }
            showMsg("Cloud Berhasil Diperbarui! ✨");
        };

        window.deleteFromCloud = async (id, type) => {
            if (!confirm("Hapus selamanya dari Cloud?")) return;
            const collName = type === 'shop' ? 'products' : (type === 'clinic' ? 'clinics' : (type === 'activities' ? 'activities' : 'ads'));
            await deleteDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', collName, id));
            showMsg("Terhapus! 🗑️");
        };

        // 6. MEMBER ACTIONS (REGISTRASI & UPLOAD FOTO)
        window.handleRegister = async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const wa = document.getElementById('reg-wa').value;
            const email = document.getElementById('reg-email').value;
            if (window.currentUser) {
                const userRef = doc(db, 'artifacts', artifactAppId, 'users', window.currentUser.uid, 'profile', 'info');
                await setDoc(userRef, { name, wa, email, joinedAt: Date.now() }, { merge: true });
                showMsg("Registrasi Berhasil! 🐾");
            }
        };

        window.handleLogin = (e) => {
            e.preventDefault();
            if (window.userData) {
                showMsg("Berhasil Masuk! 😻");
                renderContent();
            } else {
                showMsg("Akun belum terdaftar. Silakan Klik 'Daftar'!");
                window.isLoginView = false;
                renderContent();
            }
        };

        window.uploadMemberPhoto = async (e) => {
            const file = e.target.files[0];
            if (!file || !window.currentUser) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                const userRef = doc(db, 'artifacts', artifactAppId, 'users', window.currentUser.uid, 'profile', 'info');
                await updateDoc(userRef, { img: base64 });
                showMsg("Foto Kucing Terunggah! 🐈📸");
            };
            reader.readAsDataURL(file);
        };

        // 7. Navigation Helpers
        window.navigateTo = (p) => {
            window.currentPage = p; window.productEditId = null; window.clinicEditId = null; window.tempUploadImages = [];
            window.isAddingAgenda = false; // Reset Agenda view
            renderNavs(); renderContent(); window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.handlePhotos = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) { showMsg("Maksimal 5 foto!"); return; }
            window.tempUploadImages = [];
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    window.tempUploadImages.push(ev.target.result);
                    const container = document.getElementById('upload-preview');
                    if (container) container.innerHTML = window.tempUploadImages.map(img => `<div class="w-12 h-12 rounded-lg overflow-hidden border border-orange-200"><img src="${img}" class="w-full h-full object-cover text-"></div>`).join('');
                };
                reader.readAsDataURL(file);
            });
        };

        window.checkAdminPassword = () => {
            const v = document.getElementById('admin-pass-input').value;
            if (v === window.ADMIN_PASS) { window.isAdminUnlocked = true; showMsg('Admin Aktif! 🔓'); renderContent(); } 
            else { showMsg('Gagal! ❌'); }
        };

        // 8. RENDER NAVS (7 MENU)
        function renderNavs() {
            const items = [
                { id: 'home', label: 'Home', icon: 'home' },
                { id: 'shop', label: 'Toko', icon: 'shopping-bag' },
                { id: 'clinic', label: 'Klinik', icon: 'stethoscope' },
                { id: 'activities', label: 'Agenda', icon: 'calendar-days' },
                { id: 'consultation', label: 'Konsul', icon: 'messages-square' },
                { id: 'account', label: 'Profil', icon: 'user' },
                { id: 'admin', label: 'Admin', icon: 'shield-check' }
            ];
            const mob = document.getElementById('mobile-bottom-nav');
            mob.innerHTML = items.map(m => `
                <div onclick="navigateTo('${m.id}')" class="mobile-nav-item cursor-pointer ${window.currentPage === m.id ? 'nav-item-active' : 'text-gray-400'}">
                    <div class="icon-box transition-all duration-300"><i data-lucide="${m.icon}" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-black uppercase mt-1.5 tracking-tighter leading-none text-center">${m.label}</span>
                </div>
            `).join('');

            const desk = document.getElementById('desktop-menu');
            desk.innerHTML = items.map(m => `
                <button onclick="navigateTo('${m.id}')" class="group flex items-center gap-3 bg-white p-3 rounded-2xl shadow-md transition-all ${window.currentPage === m.id ? 'ring-2 ring-orange-400' : ''}">
                    <div class="p-2 rounded-xl ${window.currentPage === m.id ? 'cute-gradient text-white' : 'bg-orange-50 text-orange-500'}"><i data-lucide="${m.icon}" class="w-5 h-5 text-"></i></div>
                    <span class="font-bold text-sm pr-4 text-">${m.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        // 9. RENDER KONTEN DINAMIS (JUMBO)
        window.renderContent = () => {
            const main = document.getElementById('main-content');
            const isAdmin = window.isAdminUnlocked;

            if (window.currentPage === 'home') {
                const displayMascot = window.userData?.img || null;
                main.innerHTML = `
                    <div class="space-y-8 animate-pop">
                        <section class="cute-gradient rounded-[3rem] p-8 md:p-16 text-center text-white relative overflow-hidden shadow-2xl shadow-orange-100 text-">
                            <div class="absolute top-0 left-0 w-32 h-32 bg-white/10 rounded-full -ml-10 -mt-10 blur-2xl"></div>
                            <div class="relative z-10 flex flex-col items-center gap-6 text-">
                                <div class="cat-avatar-frame floating" onclick="navigateTo('account')">
                                    <div class="w-40 h-40 md:w-56 md:h-56 rounded-full overflow-hidden bg-orange-100 flex items-center justify-center border-4 border-white shadow-inner">
                                        ${displayMascot ? `<img src="${displayMascot}" class="w-full h-full object-cover">` : `<i data-lucide="cat" class="w-20 h-20 text-orange-300"></i>`}
                                    </div>
                                    <div class="absolute bottom-2 right-2 bg-white text-orange-50 p-2.5 rounded-full shadow-lg text-orange-500 group-hover:scale-125 transition-all"><i data-lucide="camera" class="w-6 h-6"></i></div>
                                </div>
                                <h1 class="text-3xl md:text-5xl font-black leading-tight tracking-tighter uppercase text-">Look The Cats <br> Indonesia</h1>
                            </div>
                        </section>

                        <!-- SPACE IKLAN PROPORSIAL HOME -->
                        <section class="text-">
                            <div class="bg-white p-2 rounded-[2.5rem] shadow-sm border border-orange-50 overflow-hidden">
                                <div class="item-slider no-scrollbar h-48 md:h-72 rounded-[1.8rem] bg-gray-50 text-">
                                    ${window.ADS_LIST.length > 0 ? window.ADS_LIST.map(ad => `<img src="${ad.image}" class="w-full h-full object-cover">`).join('') : `<div class="w-full h-full flex flex-col items-center justify-center text-orange-200 opacity-30 text-"><i data-lucide="image" class="w-14 h-14"></i><p class="text-[10px] font-black mt-2 uppercase tracking-widest text-">Space Iklan Tersedia</p></div>`}
                                </div>
                            </div>
                        </section>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 px-2 text-">
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm text-"><div class="bg-orange-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-orange-500 shadow-inner text-"><i data-lucide="zap" class="w-5 h-5"></i></div><p class="font-black text-sm uppercase text-gray-400 leading-none">Respon</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm text-"><div class="bg-pink-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-pink-500 shadow-inner text-"><i data-lucide="heart" class="w-5 h-5"></i></div><p class="font-black text-sm uppercase text-gray-400 leading-none">Kasih</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm text-"><div class="bg-blue-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-blue-500 shadow-inner text-"><i data-lucide="shield-check" class="w-5 h-5"></i></div><p class="font-black text-sm uppercase text-gray-400 leading-none">Member</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm text-"><div class="bg-purple-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-purple-500 shadow-inner text-"><i data-lucide="cloud" class="w-5 h-5 text-"></i></div><p class="font-black text-sm uppercase text-gray-400 leading-none">Database</p></div>
                        </div>
                    </div>

            lucide.createIcons();
        };
        window.checkout = () => { const list = window.cart.map(i => `- ${i.name} (${i.q}x)`).join('%0A'); const total = toIDR(window.cart.reduce((t, i) => t + (i.price * i.q), 0)); const msg = `Halo%20Admin%20LTC,%0ASaya%20ingin%20memesan:%0A${list}%0ATotal:%20${total}`; window.open(`https://wa.me/${window.WHATSAPP_ADMIN}?text=${msg}`, '_blank'); window.toggleCart(); window.cart = []; window.updateBadge(); };
        window.handleLogout = async () => { await auth.signOut(); window.userData = null; window.isAdminUnlocked = false; showMsg("Logout Berhasil!"); window.navigateTo('home'); };

        const toIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        function showMsg(txt) { const b = document.getElementById('message-box'); const t = document.getElementById('message-box-text'); if (t) t.innerText = txt; if (b) b.classList.remove('hidden'); setTimeout(() => { if(b) b.classList.add('hidden'); }, 3000); }
    </script>
</body>
</html>
