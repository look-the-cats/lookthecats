<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Look The Cats - Sahabat Anabul</title>
    
    <!-- Meta Tags PWA & Mobile App Experience -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LookTheCats">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fb923c">
    
    <!-- Ikon Jejak Telapak Kucing SVG Custom -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fb923c'%3E%3Cpath d='M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z'/%3E%3C/svg%3E">

    <!-- Tailwind & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #fb923c;
            --secondary: #f472b6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fffaf5;
            -webkit-tap-highlight-color: transparent;
        }

        .cute-gradient {
            background: linear-gradient(135deg, #fb923c 0%, #f472b6 100%);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-pop {
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cat-avatar-frame {
            position: relative;
            padding: 8px;
            background: white;
            border-radius: 9999px;
            box-shadow: 0 10px 25px -5px rgba(251, 146, 60, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .image-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .image-slider img {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col overflow-x-hidden">

    <!-- --- HEADER --- -->
    <header class="sticky top-0 z-50 px-4 py-3 glass-nav border-b border-orange-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center text-">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                <div class="cute-gradient p-2 rounded-2xl shadow-lg shadow-orange-200">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z"/>
                    </svg>
                </div>
                <span class="font-extrabold text-xl tracking-tight bg-clip-text text-transparent cute-gradient">Look The Cats</span>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2.5 bg-orange-50 text-orange-600 rounded-2xl transition-all active:scale-90 shadow-sm border border-orange-100">
                <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
            </button>
        </div>
    </header>

    <!-- --- MOBILE NAVIGATION (7 MENU) --- -->
    <nav class="md:hidden fixed bottom-6 left-4 right-4 z-50 glass-nav rounded-[2.5rem] shadow-2xl px-2 py-2 flex justify-around items-center" id="mobile-bottom-nav">
    </nav>

    <!-- --- MAIN CONTENT --- -->
    <main id="main-content" class="flex-grow px-4 pt-4 pb-32 max-w-6xl mx-auto w-full">
        <!-- Konten dinamis dari Firestore akan muncul di sini -->
    </main>

    <!-- --- INSTALL BANNER --- -->
    <div id="install-banner" class="hidden fixed bottom-28 left-6 right-6 z-[40] animate-pop">
        <div class="bg-white p-5 rounded-[2.5rem] shadow-2xl border border-orange-100 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="cute-gradient p-2.5 rounded-2xl shadow-lg">
                    <i data-lucide="download-cloud" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <p class="font-black text-sm text-gray-800 leading-tight">Install di HP Anda?</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Akses Lebih Cepat!</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="hideInstallBanner()" class="p-3 bg-gray-50 text-gray-400 rounded-2xl"><i data-lucide="x" class="w-4 h-4"></i></button>
                <button onclick="triggerAppInstall()" class="cute-gradient px-6 py-3 rounded-2xl text-white font-black text-xs shadow-lg uppercase">Pasang</button>
            </div>
        </div>
    </div>

    <!-- --- MODAL KERANJANG --- -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex justify-end items-end md:items-stretch">
        <div class="bg-white w-full max-w-md h-[80vh] md:h-full shadow-2xl flex flex-col animate-pop rounded-t-[3rem] md:rounded-t-none md:rounded-l-[3rem] overflow-hidden border border-orange-50 text-">
            <div class="p-6 cute-gradient text-white flex justify-between items-center">
                <h2 class="text-xl font-black flex items-center gap-3"><i data-lucide="shopping-cart"></i> Keranjang Anabul</h2>
                <button onclick="toggleCart()" class="bg-white/20 p-2 rounded-2xl transition"><i data-lucide="x"></i></button>
            </div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div id="cart-footer" class="hidden p-8 border-t bg-gray-50 rounded-t-[2rem]">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span class="text-gray-400 text-sm uppercase self-center">Total</span>
                    <span class="text-orange-600" id="cart-total-price">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full cute-gradient text-white py-4 rounded-[2rem] font-black shadow-xl shadow-orange-200 active:scale-95 transition-all text-lg">
                    Check Out (WA)
                </button>
            </div>
        </div>
    </div>

    <!-- --- TOAST MESSAGE --- -->
    <div id="message-box" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-md border border-orange-100 px-6 py-3 rounded-full shadow-2xl z-[100] flex items-center gap-3 animate-pop">
        <div class="bg-orange-100 p-1.5 rounded-full text-orange-600"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
        <span id="message-box-text" class="font-bold text-sm"></span>
    </div>

    <!-- --- FIREBASE LOGIC --- -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 1. Firebase Initialization
        const firebaseConfig = JSON.parse(__firebase_config);
        {
  apiKey: "AIzaSyBARlWoWFwiRI6VUuRMURYSbDaVzSRmn_U",
  authDomain: "look-the-cats-official.firebaseapp.com",
  projectId: "look-the-cats-official",
  storageBucket: "look-the-cats-official.firebasestorage.app",
  messagingSenderId: "1286590659",
  appId: "1:1286590659:web:1878a970fc778ae6f19276",
  measurementId: "G-XGF86YXY3Y"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'look-the-cats-v1';

        // 2. Global State
        window.WHATSAPP_ADMIN = "6281296629033";
        window.ADMIN_PASS = "Yakin537@";
        window.PRODUCTS = [];
        window.CLINIC_SERVICES = [];
        window.ACTIVITIES = [
            { id: 1, title: 'Adopsi Kucing Bersama', date: '25 April', loc: 'Tangerang Mall', type: 'Adopsi', icon: 'heart', color: 'text-orange-500', bg: 'bg-orange-50' },
            { id: 2, title: 'Vaksinasi Rabies Gratis', date: '02 Mei', loc: 'Klinik LTC', type: 'Kesehatan', icon: 'shield-check', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 3, title: 'Kontes Kucing Sehat', date: '15 Mei', loc: 'Alam Sutera', type: 'Event', icon: 'trophy', color: 'text-pink-500', bg: 'bg-pink-50' },
            { id: 4, title: 'Seminar Perawatan Kitten', date: '20 Mei', loc: 'Zoom Online', type: 'Edukasi', icon: 'book', color: 'text-purple-500', bg: 'bg-purple-50' }
        ];
        window.consultations = [];
        window.currentPage = 'home';
        window.cart = [];
        window.currentUser = null;
        window.isAdminUnlocked = false;
        window.globalMascot = null;
        window.tempUploadImages = [];
        window.productEditId = null;
        window.clinicEditId = null;

        // 3. Auth Management
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.currentUser = user;
            if (user) {
                setupRealtimeListeners();
            }
            renderNavs();
            renderContent();
        });

        // 4. Realtime Database Listeners
        const setupRealtimeListeners = () => {
            // Listen Products
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snap) => {
                window.PRODUCTS = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentPage === 'shop') renderContent();
            }, (err) => console.error("Firestore Products Error:", err));

            // Listen Clinics
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'clinics'), (snap) => {
                window.CLINIC_SERVICES = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentPage === 'clinic') renderContent();
            }, (err) => console.error("Firestore Clinics Error:", err));

            // Listen Consultations
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'consultations'), (snap) => {
                window.consultations = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if (window.currentPage === 'consultation') renderContent();
            }, (err) => console.error("Firestore Consultations Error:", err));
        };

        // 5. Expose Actions to Global for HTML
        window.navigateTo = (page) => {
            window.currentPage = page;
            window.productEditId = null;
            window.clinicEditId = null;
            window.tempUploadImages = [];
            renderNavs();
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.checkAdminPassword = () => {
            const input = document.getElementById('admin-pass-input');
            if (input.value === window.ADMIN_PASS) {
                window.isAdminUnlocked = true;
                showMsg('Akses Pengelola Terbuka! 🔓');
                renderContent();
            } else { showMsg('Password Salah! ❌'); }
        };

        window.lockAdmin = () => {
            window.isAdminUnlocked = false;
            showMsg('Admin Dikunci 🔒');
            window.navigateTo('home');
        };

        window.handlePhotos = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) { showMsg("Maksimal 5 foto!"); return; }
            window.tempUploadImages = [];
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    window.tempUploadImages.push(ev.target.result);
                    const preview = document.getElementById('upload-preview');
                    if (preview) {
                        preview.innerHTML = window.tempUploadImages.map(img => `<div class="w-16 h-16 rounded-xl overflow-hidden border border-orange-200"><img src="${img}" class="w-full h-full object-cover"></div>`).join('');
                    }
                };
                reader.readAsDataURL(file);
            });
        };

        window.saveToFirestore = async (e, type) => {
            e.preventDefault();
            if (!window.currentUser) return showMsg("Harap Login!");
            
            const name = document.getElementById('item-name').value;
            const collName = type === 'shop' ? 'products' : 'clinics';
            const collRef = collection(db, 'artifacts', appId, 'public', 'data', collName);

            let dataObj = { name, updatedAt: Date.now() };

            if (type === 'shop') {
                const price = parseInt(document.getElementById('item-price').value);
                const cat = document.getElementById('item-cat').value;
                dataObj = { ...dataObj, price, cat, images: window.tempUploadImages.length > 0 ? window.tempUploadImages : [] };
                if (window.productEditId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', window.productEditId), dataObj);
                } else { await addDoc(collRef, dataObj); }
                window.navigateTo('shop');
            } else {
                dataObj = {
                    ...dataObj,
                    license: document.getElementById('c-license').value,
                    doctor: document.getElementById('c-doctor').value,
                    owner: document.getElementById('c-owner').value,
                    address: document.getElementById('c-address').value,
                    services: document.getElementById('c-services').value,
                    images: window.tempUploadImages.length > 0 ? window.tempUploadImages : []
                };
                if (window.clinicEditId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clinics', window.clinicEditId), dataObj);
                } else { await addDoc(collRef, dataObj); }
                window.navigateTo('clinic');
            }
            showMsg("Cloud Berhasil Diperbarui! ☁️");
        };

        window.deleteFromFirestore = async (id, type) => {
            if (!confirm("Hapus data selamanya?")) return;
            const collName = type === 'shop' ? 'products' : 'clinics';
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collName, id));
            showMsg("Dihapus dari Cloud! 🗑️");
        };

        window.startConsultFirestore = async () => {
            const topic = prompt("Tulis topik konsul:");
            if (topic) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'consultations'), {
                    sender: window.currentUser.email || "CatLover",
                    topic,
                    status: 'Aktif',
                    messages: [{ from: 'User', text: 'Tanya seputar ' + topic, time: Date.now() }]
                });
                showMsg("Konsultasi Dimulai! 🐾");
            }
        };

        window.sendChatFirestore = async (id) => {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            const consult = window.consultations.find(c => c.id === id);
            const newMessages = [...consult.messages, { from: window.isAdminUnlocked ? 'Admin' : 'User', text: input.value, time: Date.now() }];
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'consultations', id), { messages: newMessages });
            window.viewChat(id);
        };

        window.handleLogout = async () => {
            await auth.signOut();
            window.isAdminUnlocked = false;
            showMsg("Logout Berhasil!");
            window.navigateTo('home');
        };

        // Start Auth
        initAuth();

        // 6. DRAWERS & UI RENDERING
        function renderNavs() {
            const items = [
                { id: 'home', label: 'Home', icon: 'home' },
                { id: 'shop', label: 'Toko', icon: 'shopping-bag' },
                { id: 'clinic', label: 'Klinik', icon: 'stethoscope' },
                { id: 'activities', label: 'Agenda', icon: 'calendar-days' },
                { id: 'consultation', label: 'Konsul', icon: 'messages-square' },
                { id: 'account', label: 'Profil', icon: 'user' },
                { id: 'admin', label: 'Admin', icon: 'shield-check' }
            ];
            const mob = document.getElementById('mobile-bottom-nav');
            mob.innerHTML = items.map(m => `
                <button onclick="navigateTo('${m.id}')" class="flex flex-col items-center px-3 py-2 rounded-2xl transition-all ${window.currentPage === m.id ? 'text-orange-500 scale-110' : 'text-gray-400'}">
                    <div class="${window.currentPage === m.id ? 'cute-gradient p-2 rounded-xl shadow-lg' : ''}"><i data-lucide="${m.icon}" class="w-4 h-4 ${window.currentPage === m.id ? 'text-white' : ''}"></i></div>
                    <span class="text-[6px] font-black uppercase mt-1 ${window.currentPage === m.id ? 'block' : 'hidden'}">${m.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        window.renderContent = () => {
            const main = document.getElementById('main-content');
            const isAdmin = window.isAdminUnlocked;

            if (window.currentPage === 'home') {
                main.innerHTML = `
                    <div class="space-y-10 animate-pop text-[Image of Banner Home]">
                        <section class="cute-gradient rounded-[3rem] p-8 md:p-16 text-center text-white relative overflow-hidden shadow-2xl shadow-orange-200">
                            <div class="absolute top-0 left-0 w-32 h-32 bg-white/10 rounded-full -ml-10 -mt-10 blur-2xl"></div>
                            <div class="relative z-10 flex flex-col items-center gap-6">
                                <div class="cat-avatar-frame floating cursor-pointer group" onclick="navigateTo('account')">
                                    <div class="w-40 h-40 md:w-56 md:h-56 rounded-full overflow-hidden bg-orange-100 flex items-center justify-center border-4 border-white shadow-inner">
                                        <i data-lucide="cat" class="w-20 h-20 text-orange-300"></i>
                                    </div>
                                    <div class="absolute bottom-2 right-2 bg-white text-orange-500 p-2 rounded-full shadow-lg group-hover:scale-125 transition"><i data-lucide="camera" class="w-5 h-5"></i></div>
                                </div>
                                <h1 class="text-3xl md:text-5xl font-black leading-tight tracking-tighter">Look The Cats <br> Indonesia</h1>
                                <p class="text-orange-50 font-medium max-w-md opacity-90 leading-relaxed px-4">Cloud Database Aktif. Kelola data kucing nasional secara realtime dalam satu aplikasi HP.</p>
                                <div class="flex gap-3 w-full max-w-xs px-4">
                                    <button onclick="navigateTo('shop')" class="flex-1 bg-white text-orange-600 py-4 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition">Toko</button>
                                    <button onclick="navigateTo('clinic')" class="flex-1 bg-black/20 backdrop-blur-md text-white py-4 rounded-[1.5rem] font-black border border-white/30 active:scale-95 transition">Klinik</button>
                                </div>
                            </div>
                        </section>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 px-2">
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm"><div class="bg-orange-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-orange-500 shadow-inner"><i data-lucide="zap" class="w-5 h-5"></i></div><p class="font-bold text-xs uppercase text-gray-400">Kilat</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm"><div class="bg-pink-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-pink-500 shadow-inner"><i data-lucide="heart" class="w-5 h-5"></i></div><p class="font-bold text-xs uppercase text-gray-400">Sayang</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm"><div class="bg-blue-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-blue-500 shadow-inner"><i data-lucide="shield-check" class="w-5 h-5"></i></div><p class="font-bold text-xs uppercase text-gray-400">PWA</p></div>
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm"><div class="bg-purple-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-purple-500 shadow-inner"><i data-lucide="cloud" class="w-5 h-5"></i></div><p class="font-bold text-xs uppercase text-gray-400">Cloud</p></div>
                        </div>
                    </div>
                `;
            }
            else if (window.currentPage === 'shop' || window.currentPage === 'clinic') {
                const type = window.currentPage;
                const isShop = type === 'shop';
                const list = isShop ? window.PRODUCTS : window.CLINIC_SERVICES;
                const editId = isShop ? window.productEditId : window.clinicEditId;
                const editTarget = editId ? list.find(x => x.id === editId) : null;

                main.innerHTML = `
                    <div class="space-y-6 animate-pop">
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-orange-50 text-">
                            <div class="flex justify-between items-center">
                                <div><h2 class="text-2xl font-black text-gray-800 tracking-tight uppercase">${isShop ? 'Toko Anabul' : 'Klinik Kucing'}</h2><p class="text-xs text-gray-400 font-medium">${isShop ? 'Pakan & Aksesoris' : 'Direktori Medis Terpercaya'}</p></div>
                                <div class="bg-orange-100 p-3 rounded-2xl text-orange-500 shadow-inner"><i data-lucide="${isShop ? 'shopping-bag' : 'stethoscope'}" class="w-6 h-6"></i></div>
                            </div>
                            ${isAdmin ? `
                            <div class="mt-6 p-6 bg-orange-50/50 border border-orange-100 rounded-[2rem] animate-fade-in text-">
                                <h3 class="font-black text-orange-600 text-xs mb-4 uppercase tracking-[0.2em]">${editId ? 'Update Data' : 'Tambah Baru'}</h3>
                                <form onsubmit="saveToFirestore(event, '${type}')" class="space-y-4">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <input type="text" id="item-name" placeholder="Nama" required value="${editTarget ? editTarget.name : ''}" class="p-3.5 rounded-2xl bg-white border-none outline-none focus:ring-2 focus:ring-orange-300 text-sm font-bold shadow-sm">
                                        ${isShop ? `<input type="number" id="item-price" placeholder="Harga" required value="${editTarget ? editTarget.price : ''}" class="p-3.5 rounded-2xl bg-white border-none outline-none focus:ring-2 focus:ring-orange-300 text-sm font-bold shadow-sm">` : `<input type="text" id="c-license" placeholder="Nomor Izin" required value="${editTarget ? editTarget.license : ''}" class="p-3.5 rounded-2xl bg-white border-none outline-none focus:ring-2 focus:ring-blue-300 text-sm font-bold shadow-sm">`}
                                    </div>
                                    ${!isShop ? `
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <input type="text" id="c-doctor" placeholder="Dr. Penanggung Jawab" required value="${editTarget ? editTarget.doctor : ''}" class="p-3.5 rounded-2xl bg-white text-sm font-bold">
                                            <input type="text" id="c-owner" placeholder="Nama Pemilik" required value="${editTarget ? editTarget.owner : ''}" class="p-3.5 rounded-2xl bg-white text-sm font-bold">
                                        </div>
                                        <input type="text" id="c-address" placeholder="Alamat Klinik" required value="${editTarget ? editTarget.address : ''}" class="w-full p-3.5 rounded-2xl bg-white text-sm font-bold">
                                        <textarea id="c-services" placeholder="Layanan (Vaksin, Steril, dll)" class="w-full p-3.5 rounded-2xl bg-white h-20 text-sm font-bold">${editTarget ? editTarget.services : ''}</textarea>
                                    ` : ''}
                                    <div class="flex flex-col gap-2 text-">
                                        <label class="text-[9px] font-black text-gray-400 uppercase px-2">Unggah Foto (3-5 Foto)</label>
                                        <input type="file" multiple accept="image/*" onchange="handlePhotos(event)" class="p-3 rounded-2xl bg-white text-xs font-bold shadow-sm border border-orange-50">
                                        <div id="upload-preview" class="flex gap-2 px-2 mt-1"></div>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <select id="item-cat" class="p-3.5 rounded-2xl bg-white border-none outline-none text-sm font-bold shadow-sm">
                                            ${isShop ? '<option value="Makanan">Makanan</option><option value="Kesehatan">Kesehatan</option><option value="Mainan">Mainan</option>' : '<option value="Klinik">Klinik</option>'}
                                        </select>
                                        <button type="submit" class="cute-gradient text-white py-4 rounded-2xl font-black shadow-lg shadow-orange-100 uppercase tracking-widest text-xs">Simpan ke Cloud</button>
                                    </div>
                                </form>
                            </div>` : ''}
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 text-">
                            ${list.map(item => `
                                <div class="bg-white p-4 rounded-[2.5rem] border border-orange-50 shadow-sm flex flex-col h-full overflow-hidden">
                                    <div class="h-56 rounded-[2rem] mb-4 overflow-hidden relative shadow-inner bg-orange-50">
                                        <div class="image-slider no-scrollbar h-full w-full">
                                            ${item.images && item.images.length > 0 ? item.images.map(img => `<img src="${img}">`).join('') : `<div class="w-full h-full flex items-center justify-center text-orange-200 opacity-30"><i data-lucide="camera" class="w-12 h-12"></i></div>`}
                                        </div>
                                        <div class="absolute top-3 left-3 bg-white/95 px-3 py-1 rounded-full text-[8px] font-black text-orange-500 uppercase tracking-widest z-10 border border-orange-50 shadow-sm">${item.cat || 'LTC'}</div>
                                    </div>
                                    <h3 class="font-black text-gray-800 text-sm px-1 leading-none uppercase mb-2 tracking-tight">${item.name}</h3>
                                    ${item.address ? `<p class="text-[10px] text-gray-400 font-bold px-1 mb-1 italic line-clamp-1"><i data-lucide="map-pin" class="w-3 h-3 inline"></i> ${item.address}</p>` : ''}
                                    ${item.doctor ? `<p class="text-[10px] text-blue-500 font-black px-1 mb-3 uppercase tracking-tighter">Dr: ${item.doctor}</p>` : ''}
                                    <div class="mt-auto pt-3 flex justify-between items-center border-t border-gray-50 px-1 text-">
                                        <p class="font-black text-orange-600 text-lg tracking-tighter">${item.price ? toIDR(item.price) : 'INFO WA'}</p>
                                        <div class="flex gap-1 text-">
                                            ${isAdmin ? `
                                                <button onclick="${isShop ? 'productEditId' : 'clinicEditId'}='${item.id}'; renderContent();" class="p-2.5 bg-blue-50 text-blue-500 rounded-xl active:scale-75 transition border border-blue-100 shadow-sm"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                                <button onclick="deleteItemFirestore('${item.id}', '${type}')" class="p-2.5 bg-red-50 text-red-400 rounded-xl active:scale-75 transition border border-red-100 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            ` : (isShop ? `
                                                <button onclick="addCartLocal('${item.id}')" class="cute-gradient text-white p-3 rounded-2xl shadow-lg active:scale-75 transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                            ` : `<button onclick="window.open('https://wa.me/${window.WHATSAPP_ADMIN}?text=Halo%20Admin%20LTC,%20saya%20tertarik%20dengan%20${item.name}', '_blank')" class="bg-blue-500 text-white px-5 py-2.5 rounded-2xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition">Booking</button>`)}
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            };

            // ACTIVITIES VIEW
            if (window.currentPage === 'activities') {
                main.innerHTML = `<div class="space-y-6 animate-pop text-[Image of Agenda]"><h2 class="text-2xl font-black text-gray-800 ml-2 tracking-tight">Agenda Kucing 📅</h2><div class="grid grid-cols-1 md:grid-cols-2 gap-4">${window.ACTIVITIES.map(a => `<div class="bg-white p-5 rounded-[2rem] border border-orange-50 flex items-center gap-5 shadow-sm hover:shadow-md transition text-"><div class="${a.bg} ${a.color} w-16 h-16 rounded-[1.5rem] flex flex-col items-center justify-center border-2 border-white shadow-inner font-black uppercase tracking-widest"><span class="text-[8px]">${a.date.split(' ')[1]}</span><span class="text-xl">${a.date.split(' ')[0]}</span></div><div class="flex-1"><h3 class="font-black text-sm text-gray-800 leading-tight">${a.title}</h3><p class="text-[10px] text-gray-400 font-bold uppercase mt-1 tracking-tight"><i data-lucide="map-pin" class="w-2.5 h-2.5 inline text-[Image of Pin]"></i> ${a.loc}</p><button onclick="window.open('https://wa.me/${window.WHATSAPP_ADMIN}?text=Daftar%20Agenda:%20${a.title}', '_blank')" class="mt-2 text-orange-500 font-black text-[10px] uppercase tracking-widest hover:underline">Daftar Sekarang</button></div></div>`).join('')}</div></div>`;
            }

            // ACCOUNT VIEW
            else if (window.currentPage === 'account') {
                if (window.currentUser) {
                    main.innerHTML = `<div class="max-w-md mx-auto animate-pop pt-10 text-"><div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-orange-50 text-center relative overflow-hidden"><div class="absolute top-0 left-0 w-full h-32 cute-gradient rounded-b-[4rem]"></div><div class="relative z-10"><div class="cat-avatar-frame w-32 h-32 mx-auto mb-6 ring-8 ring-white shadow-xl overflow-hidden text-"><div class="w-full h-full rounded-full overflow-hidden bg-orange-100 flex items-center justify-center">${window.currentUser.photoURL ? `<img src="${window.currentUser.photoURL}" class="w-full h-full object-cover">` : `<i data-lucide="user" class="w-16 h-16 text-orange-300"></i>`}</div></div><h2 class="text-2xl font-black text-gray-900 leading-tight uppercase tracking-tighter">ID: ${window.currentUser.uid.substring(0,8)}</h2><p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mt-1">Sesi Cloud Aktif</p><div class="mt-8 space-y-3"><button onclick="triggerAppInstall()" class="w-full bg-orange-50 text-orange-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-orange-100 shadow-sm transition active:scale-95"><i data-lucide="smartphone" class="w-4 h-4 inline"></i> Pasang di HP</button><button onclick="handleLogout()" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-red-100 shadow-sm transition active:scale-95"><i data-lucide="log-out" class="w-4 h-4 inline"></i> Logout Sesi</button></div></div></div></div>`;
                } else {
                    main.innerHTML = `<div class="max-w-md mx-auto bg-white p-10 rounded-[3.5rem] shadow-2xl border border-orange-50 animate-pop mt-4 text-"><div class="text-center mb-10"><div class="cute-gradient w-14 h-14 rounded-[1.5rem] flex items-center justify-center mx-auto mb-4 shadow-xl"><i data-lucide="log-in" class="text-white"></i></div><h2 class="text-3xl font-black text-gray-900 leading-tight tracking-tight uppercase">Login Look The Cats</h2></div><form onsubmit="handleLogin(event)" class="space-y-4 text-"><input type="email" id="login-email" required placeholder="Alamat Email (Dummy)" class="w-full p-4 rounded-[1.5rem] bg-gray-50 border-none outline-none focus:ring-2 focus:ring-orange-300 transition-all shadow-inner text-sm font-bold"><button class="w-full cute-gradient text-white py-4 rounded-[1.5rem] font-black shadow-xl shadow-orange-200 mt-2 text-lg active:scale-95 transition uppercase tracking-widest font-extrabold text-">Mulai Sesi</button></form></div>`;
                }
            }

            // ADMIN VIEW
            else if (window.currentPage === 'admin') {
                if (!window.isAdminUnlocked) {
                    main.innerHTML = `<div class="max-w-md mx-auto space-y-6 animate-pop mt-10 text-"><div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border border-orange-50 text-center relative overflow-hidden"><div class="cute-gradient w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-white shadow-lg"><i data-lucide="lock" class="w-10 h-10"></i></div><h2 class="text-2xl font-black text-gray-800 leading-none mb-3 uppercase tracking-tighter">Area Pengelola</h2><p class="text-gray-400 text-sm leading-relaxed px-4 font-medium mt-1">Akses database pusat LTC. Masukkan password admin.</p><div class="mt-8 space-y-4 px-4"><input type="password" id="admin-pass-input" placeholder="Password Admin" class="w-full p-4 rounded-[1.5rem] bg-gray-50 border-none outline-none focus:ring-2 focus:ring-orange-300 text-center font-bold tracking-[0.4em] text-lg shadow-inner"><button onclick="checkAdminPassword()" class="w-full cute-gradient text-white py-4 rounded-[1.5rem] font-black shadow-xl active:scale-95 transition shadow-orange-200 uppercase tracking-widest text-">Buka Panel</button></div></div></div>`;
                } else {
                    main.innerHTML = `<div class="space-y-8 animate-pop text-"><div class="bg-gray-900 text-white p-10 rounded-[3.5rem] shadow-2xl relative overflow-hidden text-"><div class="absolute right-0 bottom-0 w-64 h-64 bg-white/5 rounded-full -mb-20 -mr-20 blur-3xl"></div><div class="relative z-10 flex flex-col md:flex-row justify-between items-center gap-6"><div><span class="bg-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-3 inline-block shadow-lg">LTC Cloud Terminal</span><h2 class="text-3xl font-black leading-tight tracking-tight uppercase">Manajemen Pusat <br> Realtime Database</h2></div><button onclick="lockAdmin()" class="bg-red-500/20 text-red-400 p-4 rounded-2xl border border-red-500/30 font-black text-xs active:scale-90 transition shadow-sm uppercase tracking-widest flex items-center gap-2"><i data-lucide="power" class="w-4 h-4"></i> Keluar</button></div></div><div class="bg-white rounded-[2.5rem] border border-orange-50 shadow-sm overflow-hidden text-[Image of Status Cloud]"><div class="p-6 text-center text-gray-400 font-bold uppercase text-[10px] tracking-widest bg-gray-50 flex items-center justify-center gap-2">Sistem Firebase Firestore Aktif <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div></div></div></div>`;
                }
            }
            lucide.createIcons();
        };

        // UI HELPERS
        function showMsg(txt) {
            const b = document.getElementById('message-box');
            const t = document.getElementById('message-box-text');
            if (t) t.innerText = txt;
            if (b) b.classList.remove('hidden');
            setTimeout(() => { if(b) b.classList.add('hidden'); }, 3000);
        }

        window.addCartLocal = (id) => {
            const p = window.PRODUCTS.find(x => x.id === id);
            const item = window.cart.find(x => x.id === id);
            if (item) item.q++; else window.cart.push({...p, q: 1});
            updateBadge();
            showMsg('Masuk Keranjang! 🛒');
        };

        function updateBadge() {
            const b = document.getElementById('cart-badge');
            const count = window.cart.reduce((t, i) => t + i.q, 0);
            if (b) { b.innerText = count; b.classList.toggle('hidden', count === 0); }
        }

        window.toggleCart = () => {
            const m = document.getElementById('cart-modal');
            if (m) { m.classList.toggle('hidden'); document.body.classList.toggle('modal-open'); renderCartItems(); }
        };

        function renderCartItems() {
            const c = document.getElementById('cart-items-container');
            const f = document.getElementById('cart-footer');
            if (!c) return;
            if (window.cart.length === 0) {
                c.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-300 mt-20 opacity-30 text-"><i data-lucide="shopping-bag" class="w-20 h-20 shadow-inner"></i><p class="font-black uppercase tracking-widest text-xs">Kosong Bro...</p></div>`;
                if(f) f.classList.add('hidden');
            } else {
                let total = 0;
                c.innerHTML = window.cart.map(i => {
                    total += i.price * i.q;
                    return `<div class="bg-white p-4 rounded-[2rem] border border-orange-50 shadow-sm flex gap-4 animate-pop"><div class="bg-orange-100 w-16 h-16 rounded-[1.2rem] flex items-center justify-center text-white shadow-inner"><i data-lucide="package"></i></div><div class="flex-1"><p class="font-black text-sm text-gray-800 leading-tight">${i.name}</p><div class="flex justify-between items-center mt-1 text-"><p class="text-orange-500 font-black text-xs">${toIDR(i.price)} x${i.q}</p><button onclick="window.cart = window.cart.filter(x => x.id !== '${i.id}'); renderCartItems(); updateBadge();" class="text-red-300 active:scale-75 transition p-1.5 bg-red-50 rounded-xl shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div></div>`;
                }).join('');
                document.getElementById('cart-total-price').innerText = toIDR(total);
                if(f) f.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        window.checkout = () => {
            const list = window.cart.map(i => `- ${i.name} (${i.q}x)`).join('%0A');
            const total = toIDR(window.cart.reduce((t, i) => t + (i.price * i.q), 0));
            const msg = `Halo%20Admin%20LTC,%0ASaya%20ingin%20memesan:%0A${list}%0ATotal:%20${total}`;
            window.open(`https://wa.me/${window.WHATSAPP_ADMIN}?text=${msg}`, '_blank');
            window.toggleCart(); window.cart = []; updateBadge();
        };

        window.hideInstallBanner = () => document.getElementById('install-banner').classList.add('hidden');
        window.triggerAppInstall = async () => {
            if (!window.deferredPrompt) { showMsg('Gunakan Menu Browser > Pasang Aplikasi'); return; }
            window.deferredPrompt.prompt();
            const { outcome } = await window.deferredPrompt.userChoice;
            if (outcome === 'accepted') { showMsg('Terpasang! 🐾'); window.hideInstallBanner(); }
            window.deferredPrompt = null;
        };

    </script>
</body>
</html>
