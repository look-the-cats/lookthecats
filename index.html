<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Look The Cats - Sahabat Anabul Terbaik</title>
    
    <!-- Meta Tags PWA Experience -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LookTheCats">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fb923c">
    
    <!-- Ikon Jejak Kaki Kucing Lucu (SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fb923c'%3E%3Cpath d='M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23fb923c'%3E%3Cpath d='M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z'/%3E%3C/svg%3E">

    <!-- CSS Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #fb923c;
            --secondary: #f472b6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #fffaf5;
            -webkit-tap-highlight-color: transparent;
        }

        .cute-gradient {
            background: linear-gradient(135deg, #fb923c 0%, #f472b6 100%);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .animate-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .cat-avatar-frame {
            position: relative;
            padding: 10px;
            background: white;
            border-radius: 9999px;
            box-shadow: 0 15px 35px -5px rgba(251, 146, 60, 0.4);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .item-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }
        .item-slider img {
            scroll-snap-align: start;
            flex-shrink: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Perbaikan Navigasi Mobile agar tidak menumpuk */
        .mobile-nav-scroll {
            display: flex;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 0.5rem 0.75rem;
            width: 100%;
            gap: 0.25rem;
            justify-content: flex-start;
        }
        
        .mobile-nav-item {
            flex: 0 0 auto;
            width: 4.8rem; /* Lebar tetap agar tidak menumpuk */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .nav-item-active {
            color: #fb923c;
        }

        .nav-item-active .icon-box {
            background: linear-gradient(135deg, #fb923c 0%, #f472b6 100%);
            box-shadow: 0 4px 12px rgba(251, 146, 60, 0.3);
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col overflow-x-hidden">

    <!-- --- HEADER --- -->
    <header class="sticky top-0 z-50 px-4 py-3 glass-nav border-b border-orange-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                <div class="cute-gradient p-2 rounded-2xl shadow-lg shadow-orange-200">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 11c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm-4.5-1c1.38 0 2.5-1.12 2.5-2.5S8.88 5 7.5 5 5 6.12 5 7.5 6.12 10 7.5 10zm9 0c1.38 0 2.5-1.12 2.5-2.5S17.88 5 16.5 5 14 6.12 14 7.5 15.12 10 16.5 10zm-4.5-2c1.38 0 2.5-1.12 2.5-2.5S13.38 3 12 3 9.5 4.12 9.5 5.5 10.62 8 12 8z"/></svg>
                </div>
                <span class="font-extrabold text-xl tracking-tighter bg-clip-text text-transparent cute-gradient uppercase">Look The Cats</span>
            </div>
            
            <button onclick="toggleCart()" class="relative p-2.5 bg-orange-50 text-orange-600 rounded-2xl transition-all active:scale-90 shadow-sm border border-orange-100">
                <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-pink-500 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center border-2 border-white">0</span>
            </button>
        </div>
    </header>

    <!-- --- NAVIGASI MOBILE (DIKUNCI AGAR TIDAK MENUMPUK) --- -->
    <nav class="md:hidden fixed bottom-6 left-3 right-3 z-50 glass-nav rounded-[2.5rem] shadow-2xl flex items-center overflow-hidden" id="mobile-nav-wrapper">
        <div class="mobile-nav-scroll no-scrollbar" id="mobile-bottom-nav">
            <!-- Menu di-render via JS -->
        </div>
    </nav>

    <!-- --- DESKTOP NAVIGATION --- -->
    <nav class="hidden md:flex fixed top-24 right-10 flex-col gap-3 z-40" id="desktop-menu">
    </nav>

    <!-- --- MAIN CONTENT --- -->
    <main id="main-content" class="flex-grow px-4 pt-4 pb-32 max-w-6xl mx-auto w-full">
    </main>

    <!-- --- INSTALL BANNER --- -->
    <div id="install-banner" class="hidden fixed bottom-28 left-6 right-6 z-[40] animate-pop">
        <div class="bg-white p-5 rounded-[2.5rem] shadow-2xl border border-orange-100 flex items-center justify-between gap-4 text-">
            <div class="flex items-center gap-3">
                <div class="cute-gradient p-2.5 rounded-2xl shadow-lg text-white">
                    <i data-lucide="smartphone"></i>
                </div>
                <div>
                    <p class="font-black text-sm text-gray-800">Pasang di HP?</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase mt-1">Akses Lebih Cepat!</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="hideInstallBanner()" class="p-3 bg-gray-50 text-gray-400 rounded-2xl"><i data-lucide="x" class="w-4 h-4"></i></button>
                <button onclick="triggerAppInstall()" class="cute-gradient px-6 py-3 rounded-2xl text-white font-black text-xs shadow-lg uppercase">Pasang</button>
            </div>
        </div>
    </div>

    <!-- --- MODAL KERANJANG --- -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex justify-end items-end md:items-stretch text-">
        <div class="bg-white w-full max-w-md h-[80vh] md:h-full shadow-2xl flex flex-col animate-pop rounded-t-[3rem] md:rounded-t-none md:rounded-l-[3rem] overflow-hidden border border-orange-50">
            <div class="p-6 cute-gradient text-white flex justify-between items-center">
                <h2 class="text-xl font-black flex items-center gap-3 uppercase"><i data-lucide="shopping-cart"></i> Keranjang Anabul</h2>
                <button onclick="toggleCart()" class="bg-white/20 p-2 rounded-2xl transition"><i data-lucide="x"></i></button>
            </div>
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div id="cart-footer" class="hidden p-8 border-t bg-gray-50 rounded-t-[2.5rem]">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span class="text-gray-400 text-sm uppercase self-center tracking-widest font-extrabold">Total Belanja</span>
                    <span class="text-orange-600" id="cart-total-price">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full cute-gradient text-white py-4 rounded-[2rem] font-black shadow-xl shadow-orange-200 active:scale-95 transition-all text-lg uppercase tracking-wider">
                    Check Out (WA)
                </button>
            </div>
        </div>
    </div>

    <!-- --- TOAST NOTIFIKASI --- -->
    <div id="message-box" class="hidden fixed top-24 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-md border border-orange-100 px-6 py-3 rounded-full shadow-2xl z-[100] flex items-center gap-3 animate-pop">
        <div class="bg-orange-100 p-1.5 rounded-full text-orange-600 shadow-inner"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
        <span id="message-box-text" class="font-bold text-sm"></span>
    </div>

    <!-- --- FIREBASE & APP LOGIC --- -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // 1. Firebase Configuration Official
        const firebaseConfig = {
            apiKey: "AIzaSyBARlWoWFwiRI6VUuRMURYSbDaVzSRmn_U",
            authDomain: "look-the-cats-official.firebaseapp.com",
            projectId: "look-the-cats-official",
            storageBucket: "look-the-cats-official.firebasestorage.app",
            messagingSenderId: "1286590659",
            appId: "1:1286590659:web:1878a970fc778ae6f19276",
            measurementId: "G-XGF86YXY3Y"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const artifactAppId = 'look-the-cats-prod-official-v3';

        // 2. Global State
        window.WHATSAPP_ADMIN = "6281296629033";
        window.ADMIN_PASS = "Yakin537@";
        window.PRODUCTS = [];
        window.CLINICS = [];
        window.consultations = [];
        window.currentPage = 'home';
        window.cart = [];
        window.currentUser = null;
        window.isAdminUnlocked = false;
        window.tempUploadImages = [];
        window.productEditId = null;
        window.clinicEditId = null;
        window.deferredPrompt = null;
        
        window.ACTIVITIES = [
            { id: 1, title: 'Adopsi Kucing Bersama', date: '25 April', loc: 'Tangerang Mall', type: 'Adopsi', icon: 'heart', color: 'text-orange-500', bg: 'bg-orange-50' },
            { id: 2, title: 'Vaksinasi Rabies Gratis', date: '02 Mei', loc: 'Klinik LTC', type: 'Kesehatan', icon: 'shield-check', color: 'text-blue-500', bg: 'bg-blue-50' },
            { id: 3, title: 'Kontes Kucing Sehat', date: '15 Mei', loc: 'Alam Sutera', type: 'Event', icon: 'trophy', color: 'text-pink-500', bg: 'bg-pink-50' },
            { id: 4, title: 'Seminar Perawatan Kitten', date: '20 Mei', loc: 'Zoom Online', type: 'Edukasi', icon: 'book', color: 'text-purple-500', bg: 'bg-purple-50' }
        ];

        // 3. Cloud Database Sync
        const setupCloudSync = () => {
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'products'), (snap) => {
                window.PRODUCTS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (window.currentPage === 'shop') renderContent();
            });
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'clinics'), (snap) => {
                window.CLINICS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (window.currentPage === 'clinic') renderContent();
            });
            onSnapshot(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'consultations'), (snap) => {
                window.consultations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (window.currentPage === 'consultation') renderContent();
            });
        };

        // 4. Initializing App & Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                setupCloudSync();
                renderNavs();
                renderContent();
            } else {
                signInAnonymously(auth);
            }
        });

        // 5. Global Actions (Firestore Writes)
        window.saveToFirestore = async (e, type) => {
            e.preventDefault();
            if (!window.currentUser) return showMsg("Login cloud diperlukan!");
            
            const name = document.getElementById('item-name').value;
            const collName = type === 'shop' ? 'products' : 'clinics';
            const collRef = collection(db, 'artifacts', artifactAppId, 'public', 'data', collName);
            let payload = { name, updatedAt: Date.now() };

            if (type === 'shop') {
                const price = parseInt(document.getElementById('item-price').value);
                const cat = document.getElementById('item-cat').value;
                payload = { ...payload, price, cat, images: window.tempUploadImages };
                if (window.productEditId) {
                    await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'products', window.productEditId), payload);
                } else { await addDoc(collRef, payload); }
                window.navigateTo('shop');
            } else {
                payload = {
                    ...payload,
                    license: document.getElementById('c-license').value,
                    doctor: document.getElementById('c-doctor').value,
                    owner: document.getElementById('c-owner').value,
                    address: document.getElementById('c-address').value,
                    services: document.getElementById('c-services').value,
                    images: window.tempUploadImages,
                    color: 'bg-blue-100'
                };
                if (window.clinicEditId) {
                    await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'clinics', window.clinicEditId), payload);
                } else { await addDoc(collRef, payload); }
                window.navigateTo('clinic');
            }
            showMsg("Cloud Diperbarui! ✨");
        };

        window.deleteFromCloud = async (id, type) => {
            if (!confirm("Hapus data selamanya dari Cloud?")) return;
            const collName = type === 'shop' ? 'products' : 'clinics';
            await deleteDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', collName, id));
            showMsg("Terhapus! 🗑️");
        };

        window.startConsultation = async () => {
            const topic = prompt("Tulis topik konsul Anda:");
            if (topic) {
                await addDoc(collection(db, 'artifacts', artifactAppId, 'public', 'data', 'consultations'), {
                    senderId: window.currentUser.uid.substring(0, 6),
                    topic, status: 'Aktif',
                    messages: [{ from: 'User', text: 'Tanya: ' + topic, time: Date.now() }]
                });
                showMsg("Terkirim! 🐾");
            }
        };

        window.sendChatCloud = async (id) => {
            const input = document.getElementById('msgInput');
            if (!input.value.trim()) return;
            const convo = window.consultations.find(c => c.id === id);
            const newMsgs = [...convo.messages, { from: window.isAdminUnlocked ? 'Admin' : 'User', text: input.value, time: Date.now() }];
            await updateDoc(doc(db, 'artifacts', artifactAppId, 'public', 'data', 'consultations', id), { messages: newMsgs });
            window.viewChat(id);
        };

        // 6. Navigation Helpers
        window.navigateTo = (p) => {
            window.currentPage = p;
            window.productEditId = null;
            window.clinicEditId = null;
            window.tempUploadImages = [];
            renderNavs();
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.checkAdminPassword = () => {
            const v = document.getElementById('admin-pass-input').value;
            if (v === window.ADMIN_PASS) {
                window.isAdminUnlocked = true;
                showMsg('Akses Admin Aktif! 🔓');
                renderContent();
            } else { showMsg('Password Salah! ❌'); }
        };

        window.lockAdmin = () => { window.isAdminUnlocked = false; showMsg('Admin Dikunci 🔒'); window.navigateTo('home'); };

        window.handlePhotos = (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 5) { showMsg("Maksimal 5 foto!"); return; }
            window.tempUploadImages = [];
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    window.tempUploadImages.push(ev.target.result);
                    const container = document.getElementById('upload-preview');
                    if (container) container.innerHTML = window.tempUploadImages.map(img => `<div class="w-12 h-12 rounded-lg overflow-hidden border border-orange-200"><img src="${img}" class="w-full h-full object-cover"></div>`).join('');
                };
                reader.readAsDataURL(file);
            });
        };

        // 7. RENDER NAVS (DENGAN PERBAIKAN LEBAR)
        function renderNavs() {
            const items = [
                { id: 'home', label: 'Home', icon: 'home' },
                { id: 'shop', label: 'Toko', icon: 'shopping-bag' },
                { id: 'clinic', label: 'Klinik', icon: 'stethoscope' },
                { id: 'activities', label: 'Agenda', icon: 'calendar-days' },
                { id: 'consultation', label: 'Konsul', icon: 'messages-square' },
                { id: 'account', label: 'Profil', icon: 'user' },
                { id: 'admin', label: 'Admin', icon: 'shield-check' }
            ];
            const mob = document.getElementById('mobile-bottom-nav');
            mob.innerHTML = items.map(m => `
                <div onclick="navigateTo('${m.id}')" class="mobile-nav-item cursor-pointer ${window.currentPage === m.id ? 'nav-item-active' : 'text-gray-400'}">
                    <div class="p-2.5 rounded-xl icon-box transition-all duration-300">
                        <i data-lucide="${m.icon}" class="w-5 h-5"></i>
                    </div>
                    <span class="text-[8px] font-black uppercase mt-1 tracking-tighter leading-none">${m.label}</span>
                </div>
            `).join('');

            const desk = document.getElementById('desktop-menu');
            desk.innerHTML = items.map(m => `
                <button onclick="navigateTo('${m.id}')" class="group flex items-center gap-3 bg-white p-3 rounded-2xl shadow-md hover:shadow-orange-100 transition-all ${window.currentPage === m.id ? 'ring-2 ring-orange-400' : ''}">
                    <div class="p-2 rounded-xl ${window.currentPage === m.id ? 'cute-gradient text-white' : 'bg-orange-50 text-orange-500'}"><i data-lucide="${m.icon}" class="w-5 h-5"></i></div>
                    <span class="font-bold text-sm pr-4">${m.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        // 8. RENDER CONTENT
        window.renderContent = () => {
            const main = document.getElementById('main-content');
            const isAdmin = window.isAdminUnlocked;

            if (window.currentPage === 'home') {
                const displayMascot = window.currentUser?.photoURL || window.globalMascot || null;
                main.innerHTML = `
                    <div class="space-y-10 animate-pop text-">
                        <section class="cute-gradient rounded-[3.5rem] p-8 md:p-16 text-center text-white relative overflow-hidden shadow-2xl shadow-orange-200">
                            <div class="absolute top-0 left-0 w-32 h-32 bg-white/10 rounded-full -ml-10 -mt-10 blur-2xl"></div>
                            <div class="relative z-10 flex flex-col items-center gap-6">
                                <div class="cat-avatar-frame floating cursor-pointer group" onclick="navigateTo('account')">
                                    <div class="w-40 h-40 md:w-60 md:h-60 rounded-full overflow-hidden bg-orange-100 flex items-center justify-center border-4 border-white shadow-inner">
                                        ${displayMascot ? `<img src="${displayMascot}" class="w-full h-full object-cover">` : `<i data-lucide="cat" class="w-24 h-24 text-orange-300 text-"></i>`}
                                    </div>
                                    <div class="absolute bottom-3 right-3 bg-white text-orange-50 p-2.5 rounded-full shadow-lg group-hover:scale-125 transition duration-300"><i data-lucide="camera" class="w-6 h-6"></i></div>
                                </div>
                                <h1 class="text-3xl md:text-5xl font-black leading-tight tracking-tighter uppercase leading-none">Look The Cats <br> Indonesia</h1>
                                <p class="text-orange-50 font-medium max-w-md opacity-90 leading-relaxed px-4">Pendaftaran anggota, belanja pakan premium, hingga direktori klinik spesialis kucing se-Indonesia secara realtime cloud.</p>
                                <div class="flex gap-3 w-full max-w-xs px-4">
                                    <button onclick="navigateTo('shop')" class="flex-1 bg-white text-orange-600 py-4 rounded-[1.8rem] font-black shadow-xl active:scale-95 transition uppercase tracking-widest text-xs">Toko</button>
                                    <button onclick="navigateTo('clinic')" class="flex-1 bg-black/20 backdrop-blur-md text-white py-4 rounded-[1.8rem] font-black border border-white/30 active:scale-95 transition uppercase tracking-widest text-xs">Klinik</button>
                                </div>
                            </div>
                        </section>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 px-2">
                            <div class="bg-white p-5 rounded-[2rem] border border-orange-50 text-center shadow-sm text-"><div class="bg-orange-100 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2 text-orange-500 shadow-inner"><i data-lucide="zap" class="w-5 h-5 text-"></i></div><p class="font-black text-sm uppercase text-gray-400 leading-none">Respon</p></div>

        window.renderCartItems = () => {
            const c = document.getElementById('cart-items-container'); const f = document.getElementById('cart-footer');
            if (!c) return;
            if (window.cart.length === 0) {
                c.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-300 gap-4 mt-20 opacity-30 text-"><i data-lucide="shopping-bag" class="w-20 h-20 shadow-inner"></i><p class="font-black uppercase tracking-widest text-xs">Kosong Bro...</p></div>`;
                if(f) f.classList.add('hidden');
            } else {
                let total = 0;
                c.innerHTML = window.cart.map(i => { total += i.price * i.q; return `<div class="bg-white p-4 rounded-[2rem] border border-orange-50 shadow-sm flex gap-4 animate-pop text-"><div class="bg-orange-100 w-16 h-16 rounded-[1.2rem] flex items-center justify-center text-white shadow-inner"><i data-lucide="package"></i></div><div class="flex-1 text-"><p class="font-black text-sm text-gray-800 leading-tight uppercase tracking-tight leading-none mb-1">${i.name}</p><div class="flex justify-between items-center mt-1 text-"><p class="text-orange-500 font-black text-xs">${toIDR(i.price)} x${i.q}</p><button onclick="window.cart = window.cart.filter(x => x.id !== '${i.id}'); window.renderCartItems(); window.updateBadge();" class="text-red-300 active:scale-75 transition p-2 bg-red-50 rounded-xl shadow-sm border border-red-100"><i data-lucide="trash-2" class="w-4 h-4 text-"></i></button></div></div></div>`; }).join('');
                document.getElementById('cart-total-price').innerText = toIDR(total);
                if(f) f.classList.remove('hidden');
            }
            lucide.createIcons();
        };
        window.checkout = () => { const list = window.cart.map(i => `- ${i.name} (${i.q}x)`).join('%0A'); const total = toIDR(window.cart.reduce((t, i) => t + (i.price * i.q), 0)); const msg = `Halo%20Admin%20LTC,%0ASaya%20ingin%20memesan:%0A${list}%0ATotal:%20${total}`; window.open(`https://wa.me/${window.WHATSAPP_ADMIN}?text=${msg}`, '_blank'); window.toggleCart(); window.cart = []; window.updateBadge(); };

        const toIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);
        function showMsg(txt) { const b = document.getElementById('message-box'); const t = document.getElementById('message-box-text'); if (t) t.innerText = txt; if (b) b.classList.remove('hidden'); setTimeout(() => { if(b) b.classList.add('hidden'); }, 3000); }
    </script>
</body>
</html>
