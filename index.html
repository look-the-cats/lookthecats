<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look The Cats - Segala Kebutuhan Anabul</title>
    
    <!-- Memanggil Tailwind CSS untuk Styling Responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memanggil Icon -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Animasi Kustom -->
    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        .animate-slide-in-right { animation: slideInRight 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        /* Mencegah scroll saat modal terbuka */
        body.modal-open { overflow: hidden; }

        /* Support untuk iPhone notch/safe area (Garis bawah iPhone) */
        .pb-safe { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- --- NAVBAR --- -->
    <nav class="bg-orange-500 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-2 cursor-pointer" onclick="navigateTo('home')">
                    <div class="bg-white text-orange-500 p-1.5 rounded-full flex items-center justify-center">
                        <i data-lucide="heart" fill="currentColor" class="w-5 h-5"></i>
                    </div>
                    <span class="font-bold text-xl tracking-wide">Look The Cats</span>
                </div>

                <!-- Desktop Menu -->
                <div class="hidden md:flex space-x-8 items-center" id="desktop-menu">
                    <!-- Menu akan di-render oleh JavaScript -->
                </div>

                <!-- Cart & Mobile Toggle -->
                <div class="flex items-center space-x-4">
                    <button onclick="toggleCart()" class="relative p-2 hover:bg-orange-600 rounded-full transition">
                        <i data-lucide="shopping-cart"></i>
                        <span id="cart-badge" class="hidden absolute top-0 right-0 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
                    </button>
                    <!-- Tombol Hamburger Dihapus untuk diganti Bottom Nav -->
                </div>
            </div>
        </div>
    </nav>

    <!-- --- MOBILE BOTTOM NAVIGATION (Aplikasi Style) --- -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-100 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.1)] z-[45] px-6 pt-2 pb-safe flex justify-between items-center" id="mobile-bottom-nav">
        <!-- Menu Bawah akan di-render oleh JavaScript -->
    </nav>

    <!-- --- MAIN CONTENT --- -->
    <!-- Menambahkan padding bawah (pb-24) agar konten tidak tertutup Bottom Nav di HP -->
    <main id="main-content" class="max-w-6xl mx-auto px-4 py-6 md:py-8 flex-grow w-full pb-24 md:pb-8">
        <!-- Konten Halaman akan disuntikkan ke sini oleh JavaScript -->
    </main>

    <!-- --- FOOTER --- -->
    <footer class="bg-gray-800 text-gray-300 py-6 text-center mt-auto mb-16 md:mb-0">
        <p class="font-semibold text-white mb-2">Look The Cats &copy; 2026</p>
        <p class="text-sm">Platform terbaik untuk pecinta kucing di Indonesia.</p>
    </footer>

    <!-- --- CART MODAL --- -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex justify-end">
        <div class="bg-white w-full max-w-md h-full shadow-2xl flex flex-col animate-slide-in-right">
            <div class="p-4 bg-orange-500 text-white flex justify-between items-center shadow-sm z-10">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="shopping-cart"></i> Keranjang Belanja
                </h2>
                <button onclick="toggleCart()" class="hover:bg-orange-600 p-1.5 rounded-full transition">
                    <i data-lucide="x"></i>
                </button>
            </div>
            
            <div id="cart-items-container" class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <!-- Item Keranjang di-render di sini -->
            </div>

            <div id="cart-footer" class="hidden p-4 border-t bg-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between text-lg font-bold mb-4">
                    <span>Total:</span>
                    <span class="text-orange-600" id="cart-total-price">Rp 0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i> Lanjut Pembayaran
                </button>
            </div>
        </div>
    </div>

    <!-- --- CUSTOM MESSAGE BOX --- -->
    <div id="message-box" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full shadow-xl z-[70] flex items-center gap-3 animate-fade-in">
        <i data-lucide="info" class="text-orange-400"></i>
        <span id="message-box-text" class="font-medium"></span>
    </div>

    <!-- --- JAVASCRIPT LOGIC --- -->
    <script>
        // --- DATA MOCKUP ---
        const PRODUCTS = [
            { id: 1, name: 'Makanan Kucing Premium (Salmon) 1kg', price: 75000, category: 'Makanan', image: 'bg-orange-200' },
            { id: 2, name: 'Pasir Kucing Wangi Lemon 5L', price: 45000, category: 'Perawatan', image: 'bg-yellow-200' },
            { id: 3, name: 'Mainan Tongkat Bulu Interaktif', price: 25000, category: 'Mainan', image: 'bg-pink-200' },
            { id: 4, name: 'Tempat Tidur Kucing Empuk', price: 120000, category: 'Aksesoris', image: 'bg-blue-200' },
            { id: 5, name: 'Snack Kucing Creamy (Tuna) 4pcs', price: 15000, category: 'Makanan', image: 'bg-red-200' },
            { id: 6, name: 'Shampo Kucing Anti Kutu 250ml', price: 35000, category: 'Perawatan', image: 'bg-green-200' },
        ];

        const ACTIVITIES = [
            { id: 1, title: 'Adopsi Kucing Bersama', date: '25 April 2026', location: 'Taman Kota Tangerang', type: 'Adopsi', iconColor: 'text-orange-600', bgColor: 'bg-orange-100' },
            { id: 2, title: 'Vaksinasi Rabies Gratis', date: '02 Mei 2026', location: 'Klinik Look The Cats', type: 'Kesehatan', iconColor: 'text-blue-600', bgColor: 'bg-blue-100' },
            { id: 3, title: 'Kontes Kucing Sehat', date: '15 Mei 2026', location: 'Mall Alam Sutera', type: 'Kompetisi', iconColor: 'text-pink-600', bgColor: 'bg-pink-100' },
            { id: 4, title: 'Seminar Perawatan Anak Kucing', date: '20 Mei 2026', location: 'Online Zoom', type: 'Edukasi', iconColor: 'text-green-600', bgColor: 'bg-green-100' },
        ];

        // --- STATE APP ---
        let currentPage = 'home';
        let cart = [];
        let userCatImage = null; // Menyimpan foto kucing yang diupload

        // --- NEW STATE: AUTH & ADMIN ---
        let currentUser = null; // Menyimpan data user yang login
        let isLoginView = false; // Toggle view login vs register
        
        // Simulasi database member (diisi dengan data awal agar tabel tidak kosong)
        let mockUsers = [
            { name: 'Andi Susanto', email: 'andi@email.com', phone: '081234567891', catName: 'Garfield', role: 'member', joinDate: 'Bulan lalu', wilayah: 'Jakarta', status: 'Aktif' },
            { name: 'Rina Melati', email: 'rina@email.com', phone: '089876543210', catName: 'Mochi', role: 'member', joinDate: '2 Bulan lalu', wilayah: 'Bandung', status: 'Aktif' }
        ]; 

        // --- CORE FUNCTIONS ---
        
        // Fungsi untuk menonaktifkan/mengaktifkan anggota (Khusus Admin Pusat)
        function toggleMemberStatus(index) {
            const user = mockUsers[index];
            if (user.status === 'Aktif') {
                user.status = 'Nonaktif';
                showMessage(`Meow! Akun ${user.name} berhasil dinonaktifkan.`);
            } else {
                user.status = 'Aktif';
                showMessage(`Meow! Akun ${user.name} berhasil diaktifkan kembali.`);
            }
            renderPage();
            lucide.createIcons();
        }

        // Fungsi untuk memicu klik pada input file tersembunyi
        function triggerUpload() {
            document.getElementById('cat-image-upload').click();
        }

        // Fungsi untuk menangani file yang dipilih dan menampilkannya
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    userCatImage = e.target.result; // Simpan data gambar
                    if (currentPage === 'home') renderPage(); // Render ulang jika di beranda
                    showMessage('Meow! Foto anabul berhasil diperbarui 😻');
                    lucide.createIcons(); // Refresh icon
                }
                reader.readAsDataURL(file);
            }
        }

        // Format Harga ke Rupiah
        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        // Custom Message Box (Pengganti Alert)
        const showMessage = (text) => {
            const msgBox = document.getElementById('message-box');
            document.getElementById('message-box-text').innerText = text;
            msgBox.classList.remove('hidden');
            setTimeout(() => { msgBox.classList.add('hidden'); }, 3000);
        };

        // --- AUTH LOGIC ---
        function toggleAuthView() {
            isLoginView = !isLoginView;
            renderPage();
            lucide.createIcons();
        }

        function handleRegister(event) {
            event.preventDefault(); // Mencegah reload halaman
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-wa').value;
            const wilayah = document.getElementById('reg-wilayah').value;
            const catName = document.getElementById('reg-cat').value;
            
            // Simpan sebagai user yang login (Status default: Langsung Aktif)
            currentUser = { name, email, phone, catName, role: 'member', joinDate: 'Hari ini', wilayah, status: 'Aktif' };
            mockUsers.push(currentUser); // Masukkan ke simulasi database
            
            showMessage(`Meow! Selamat bergabung, ${name}! Akun Anda sudah Aktif.`);
            renderNavbar();
            renderPage();
            lucide.createIcons();
            window.scrollTo(0, 0);
        }

        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            
            // Simulasi Multi-Admin: 
            // "pusat" = Admin Pusat (Bisa Approve)
            // "admin.kota" = Admin Wilayah (Hanya memantau)
            if (email) {
                let roleName = 'member';
                let displayName = 'Cat Lover';
                let wilayah = 'Umum';

                const lowerEmail = email.toLowerCase();
                
                if (lowerEmail.includes('pusat')) {
                    roleName = 'admin_pusat';
                    displayName = 'Admin Pusat';
                    wilayah = 'Nasional';
                } else if (lowerEmail.includes('admin')) {
                    roleName = 'admin_wilayah';
                    // Ambil nama kota dari email (cth: admin.jakarta@... -> jakarta)
                    let extracted = lowerEmail.split('@')[0].replace('admin.', '');
                    wilayah = extracted.charAt(0).toUpperCase() + extracted.slice(1);
                    if (wilayah === 'Admin') wilayah = 'Tangerang'; // Default
                    displayName = `Admin Wilayah ${wilayah}`;
                }

                currentUser = { name: displayName, email: email, phone: '081234567890', catName: 'Anabul', role: roleName, joinDate: 'Hari ini', wilayah: wilayah, status: 'Aktif' };
                showMessage(`Berhasil masuk! Selamat datang, ${displayName}.`);
                renderNavbar();
                renderPage();
                lucide.createIcons();
                window.scrollTo(0, 0);
            }
        }

        function handleLogout() {
            currentUser = null;
            showMessage('Anda berhasil keluar (Logout).');
            navigateTo('home');
        }

        // --- NAVIGATION ---
        function navigateTo(page) {
            currentPage = page;
            
            renderNavbar();
            renderPage();
            lucide.createIcons(); // Refresh icons after rendering new HTML
            window.scrollTo(0, 0);
        }

        function renderNavbar() {
            // Render Desktop Nav
            const navHtml = `
                <button onclick="navigateTo('home')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === 'home' ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="home" class="w-4 h-4"></i> <span>Beranda</span>
                </button>
                <button onclick="navigateTo('shop')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === 'shop' ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="shopping-bag" class="w-4 h-4"></i> <span>Toko</span>
                </button>
                <button onclick="navigateTo('activities')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === 'activities' ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="calendar" class="w-4 h-4"></i> <span>Kegiatan</span>
                </button>
                <button onclick="navigateTo('account')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === 'account' ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="user" class="w-4 h-4"></i> <span>Akun</span>
                </button>
                <button onclick="navigateTo('admin')" class="flex items-center space-x-1 hover:text-orange-200 transition ${currentPage === 'admin' ? 'font-bold underline underline-offset-4' : ''}">
                    <i data-lucide="shield" class="w-4 h-4"></i> <span>Admin</span>
                </button>
            `;
            document.getElementById('desktop-menu').innerHTML = navHtml;

            // Render Mobile Bottom Nav (Ubah icon size jadi w-5 h-5 agar muat 5 menu)
            const mobileNav = document.getElementById('mobile-bottom-nav');
            if(mobileNav) {
                mobileNav.innerHTML = `
                    <button onclick="navigateTo('home')" class="flex flex-col items-center w-full py-1 ${currentPage === 'home' ? 'text-orange-600' : 'text-gray-400 hover:text-gray-600'} transition">
                        <i data-lucide="home" class="w-5 h-5 mb-1 ${currentPage === 'home' ? 'fill-orange-100' : ''}"></i>
                        <span class="text-[10px] font-bold">Beranda</span>
                    </button>
                    <button onclick="navigateTo('shop')" class="flex flex-col items-center w-full py-1 ${currentPage === 'shop' ? 'text-orange-600' : 'text-gray-400 hover:text-gray-600'} transition">
                        <i data-lucide="shopping-bag" class="w-5 h-5 mb-1 ${currentPage === 'shop' ? 'fill-orange-100' : ''}"></i>
                        <span class="text-[10px] font-bold">Toko</span>
                    </button>
                    <button onclick="navigateTo('activities')" class="flex flex-col items-center w-full py-1 ${currentPage === 'activities' ? 'text-orange-600' : 'text-gray-400 hover:text-gray-600'} transition">
                        <i data-lucide="calendar" class="w-5 h-5 mb-1 ${currentPage === 'activities' ? 'fill-orange-100' : ''}"></i>
                        <span class="text-[10px] font-bold">Kegiatan</span>
                    </button>
                    <button onclick="navigateTo('account')" class="flex flex-col items-center w-full py-1 ${currentPage === 'account' ? 'text-orange-600' : 'text-gray-400 hover:text-gray-600'} transition">
                        <i data-lucide="user" class="w-5 h-5 mb-1 ${currentPage === 'account' ? 'fill-orange-100' : ''}"></i>
                        <span class="text-[10px] font-bold">Akun</span>
                    </button>
                    <button onclick="navigateTo('admin')" class="flex flex-col items-center w-full py-1 ${currentPage === 'admin' ? 'text-orange-600' : 'text-gray-400 hover:text-gray-600'} transition">
                        <i data-lucide="shield" class="w-5 h-5 mb-1 ${currentPage === 'admin' ? 'fill-orange-100' : ''}"></i>
                        <span class="text-[10px] font-bold">Admin</span>
                    </button>
                `;
            }
        }

        // --- CART LOGIC ---
        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                document.body.classList.add('modal-open');
                renderCart();
            } else {
                modal.classList.add('hidden');
                document.body.classList.remove('modal-open');
            }
        }

        function addToCart(productId) {
            const product = PRODUCTS.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCartBadge();
            showMessage(`Berhasil menambahkan ${product.name} ke keranjang!`);
            if (!document.getElementById('cart-modal').classList.contains('hidden')) {
                renderCart();
            }
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartBadge();
            renderCart();
        }

        function updateQuantity(productId, delta) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
                updateCartBadge();
                renderCart();
            }
        }

        function updateCartBadge() {
            const count = cart.reduce((total, item) => total + item.quantity, 0);
            const badge = document.getElementById('cart-badge');
            if (count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function checkout() {
            toggleCart();
            showMessage("Fitur Checkout akan segera hadir di versi selanjutnya! 🐾");
        }

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const footer = document.getElementById('cart-footer');
            const totalPriceEl = document.getElementById('cart-total-price');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-gray-400 space-y-4">
                        <i data-lucide="shopping-bag" class="w-16 h-16 opacity-50"></i>
                        <p class="text-center font-medium">Keranjang masih kosong, meow!</p>
                        <button onclick="toggleCart(); navigateTo('shop');" class="mt-4 bg-orange-100 text-orange-600 px-5 py-2.5 rounded-full font-bold hover:bg-orange-200 transition">
                            Mulai Belanja
                        </button>
                    </div>
                `;
                footer.classList.add('hidden');
            } else {
                let html = '<div class="space-y-4">';
                let total = 0;
                
                cart.forEach(item => {
                    total += item.price * item.quantity;
                    html += `
                        <div class="flex gap-4 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                            <div class="w-20 h-20 rounded-lg ${item.image} flex-shrink-0 border border-black/5"></div>
                            <div class="flex-1 flex flex-col justify-between">
                                <div>
                                    <h4 class="font-semibold text-sm leading-tight text-gray-800 line-clamp-2">${item.name}</h4>
                                    <p class="text-orange-500 font-bold text-sm mt-1">${formatRupiah(item.price)}</p>
                                </div>
                                <div class="flex items-center justify-between mt-2">
                                    <div class="flex items-center space-x-1 bg-gray-100 rounded-lg p-1">
                                        <button onclick="updateQuantity(${item.id}, -1)" class="p-1 hover:bg-gray-200 rounded text-gray-600"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                                        <span class="text-sm w-6 text-center font-bold text-gray-700">${item.quantity}</span>
                                        <button onclick="updateQuantity(${item.id}, 1)" class="p-1 hover:bg-gray-200 rounded text-gray-600"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                                    </div>
                                    <button onclick="removeFromCart(${item.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 rounded transition">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
                
                totalPriceEl.innerText = formatRupiah(total);
                footer.classList.remove('hidden');
            }
            lucide.createIcons();
        }

        // --- PAGES RENDERER ---
        function renderPage() {
            const main = document.getElementById('main-content');
            
            if (currentPage === 'home') {
                // Cek apakah user yang sedang login adalah Admin (Pusat atau Wilayah)
                const isAdmin = currentUser !== null && (currentUser.role === 'admin_pusat' || currentUser.role === 'admin_wilayah');

                main.innerHTML = `
                    <div class="space-y-8 md:space-y-12 animate-fade-in">
                        <!-- Hero Section -->
                        <section class="bg-gradient-to-r from-orange-100 to-orange-50 rounded-[2rem] p-6 sm:p-8 md:p-12 flex flex-col-reverse md:flex-row items-center gap-6 md:gap-8 shadow-sm text-center md:text-left">
                            <div class="flex-1 space-y-4 md:space-y-6">
                                <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-gray-900 leading-tight">
                                    Segala Kebutuhan Si Anabul <span class="text-orange-500 block mt-1 md:mt-2">Ada di Sini!</span>
                                </h1>
                                <p class="text-sm sm:text-base md:text-lg text-gray-600 leading-relaxed px-2 md:px-0">
                                    Mulai dari makanan premium, mainan lucu, hingga informasi acara adopsi dan klinik. Look The Cats adalah sahabat terbaik untuk Anda dan kucing kesayangan.
                                </p>
                                <div class="flex flex-col sm:flex-row justify-center md:justify-start gap-3 pt-2">
                                    <button onclick="navigateTo('shop')" class="w-full sm:w-auto bg-orange-500 hover:bg-orange-600 text-white px-8 py-3.5 rounded-full font-bold shadow-lg shadow-orange-500/30 transition flex items-center justify-center gap-2">
                                        <i data-lucide="shopping-bag" class="w-5 h-5"></i> Belanja Sekarang
                                    </button>
                                    <button onclick="navigateTo('activities')" class="w-full sm:w-auto bg-white hover:bg-gray-50 text-orange-500 border-2 border-orange-200 px-8 py-3.5 rounded-full font-bold transition flex items-center justify-center gap-2">
                                        <i data-lucide="calendar" class="w-5 h-5"></i> Lihat Kegiatan
                                    </button>
                                </div>
                            </div>
                            <div class="flex-1 flex justify-center w-full pb-4 md:pb-0">
                                <div ${isAdmin ? 'onclick="triggerUpload()"' : ''} class="w-48 h-48 sm:w-64 sm:h-64 md:w-80 md:h-80 bg-orange-200 rounded-full flex items-center justify-center shadow-inner relative overflow-hidden ${isAdmin ? 'cursor-pointer group hover:ring-4 hover:ring-orange-300 transition-all' : ''}" title="${isAdmin ? 'Klik untuk upload foto maskot' : 'Maskot Kucing'}">
                                    ${isAdmin ? `<input type="file" id="cat-image-upload" class="hidden" accept="image/*" onchange="handleImageUpload(event)">` : ''}
                                    ${userCatImage ? 
                                        `<img src="${userCatImage}" class="w-full h-full object-cover z-10 ${isAdmin ? 'transition-transform duration-500 group-hover:scale-110' : ''}" alt="Maskot Kucing">
                                         ${isAdmin ? `<div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20">
                                            <i data-lucide="camera" class="w-8 h-8 text-white mb-1"></i>
                                            <span class="text-white font-bold text-sm">Ganti Foto</span>
                                         </div>` : ''}`
                                        :
                                        `<div class="absolute inset-0 flex items-center justify-center opacity-20 ${isAdmin ? 'group-hover:opacity-40 transition-opacity' : ''}">
                                            <i data-lucide="heart" class="w-32 h-32 md:w-48 md:h-48 text-orange-400"></i>
                                        </div>
                                        ${isAdmin ? 
                                            `<div class="z-10 flex flex-col items-center group-hover:scale-110 transition-transform">
